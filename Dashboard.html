<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operations Dashboard</title>
  <style>
    :root{
      --bg:#f4f6f8;
      --panel:#ffffff;
      --text:#17202a;
      --muted:#667085;
      --line:#e4e7ec;
      --accent:#ff9900;
      --danger:#d92d20;
      --warn:#f79009;
      --ok:#12b76a;
      --shadow:0 10px 30px rgba(16,24,40,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:260px 1fr;
    }
    aside{
      background:#111827;
      color:#fff;
      padding:20px 16px;
    }
    .brand{
      font-size:20px;
      font-weight:800;
      margin-bottom:8px;
    }
    .sub{
      color:#9ca3af;
      font-size:13px;
      margin-bottom:22px;
    }
    .feature{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 8px;
      border-radius:8px;
      margin-bottom:5px;
      font-size:14px;
    }
    .feature:hover{background:#1f2937}
    .feature input{accent-color:var(--accent)}
    main{padding:24px; min-width:0}
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:18px;
    }
    .title h1{margin:0;font-size:26px}
    .title p{margin:5px 0 0;color:var(--muted);font-size:13px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    button,.file-label{
      border:1px solid var(--line);
      background:#fff;
      padding:9px 12px;
      border-radius:8px;
      cursor:pointer;
      font-weight:700;
      font-size:13px;
    }
    button.primary{background:var(--accent);border-color:var(--accent);color:#111}
    #fileInput{display:none}
    .status{
      background:#fff;
      border:1px solid var(--line);
      padding:10px 12px;
      border-radius:10px;
      margin-bottom:14px;
      font-size:13px;
      color:var(--muted);
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .card-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 16px;
      cursor:pointer;
      border-bottom:1px solid var(--line);
    }
    .card-title{font-weight:800}
    .badge{
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      background:#f2f4f7;
      color:#344054;
    }
    .card-body{padding:8px 16px 14px}
    .item{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:10px 0;
      border-bottom:1px solid #f0f2f5;
      font-size:13px;
    }
    .item:last-child{border-bottom:0}
    .item a{color:var(--text);text-decoration:none}
    .item a:hover{text-decoration:underline}
    .meta{color:var(--muted);white-space:nowrap}
    .hidden{display:none!important}
    .empty{padding:24px;text-align:center;color:var(--muted)}
    @media(max-width:900px){
      .app{grid-template-columns:1fr}
      aside{position:static}
      .grid{grid-template-columns:1fr}
      .topbar{align-items:flex-start;flex-direction:column}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">Ops Dashboard</div>
      <div class="sub">Choose what you want to see</div>
      <div id="featureList"></div>
    </aside>

    <main>
      <div class="topbar">
        <div class="title">
          <h1>Operations Dashboard</h1>
          <p>One page. Multiple sources. Only selected information.</p>
        </div>
        <div class="actions">
          <label class="file-label" for="fileInput">Import JSON</label>
          <input type="file" id="fileInput" accept=".json,application/json" />
          <button id="demoBtn">Load Demo</button>
          <button id="clearBtn">Clear</button>
          <button id="refreshBtn" class="primary">Refresh View</button>
        </div>
      </div>

      <div class="status" id="status">Waiting for data from Tampermonkey or JSON import.</div>
      <section class="grid" id="dashboard"></section>
    </main>
  </div>

<script>
const defaultData = {
  updatedAt: new Date().toISOString(),
  sections: [
    {
      id: "top-stories",
      title: "Top Stories",
      icon: "🔥",
      items: [
        {label:"Example story one", value:"120 points", link:"#"},
        {label:"Example story two", value:"84 points", link:"#"}
      ]
    },
    {
      id: "new-stories",
      title: "New Stories",
      icon: "🆕",
      items: [
        {label:"Newest example item", value:"2 min ago", link:"#"}
      ]
    },
    {
      id: "jobs",
      title: "Jobs",
      icon: "💼",
      items: [
        {label:"Example job post", value:"Today", link:"#"}
      ]
    }
  ]
};

let dashboardData = JSON.parse(localStorage.getItem("opsDashboardData") || "null");
let selected = JSON.parse(localStorage.getItem("opsDashboardSelected") || "null");

function ensureSelection(data){
  if(!selected){
    selected = {};
    data.sections.forEach(s => selected[s.id] = true);
  } else {
    data.sections.forEach(s => {
      if(selected[s.id] === undefined) selected[s.id] = true;
    });
  }
  localStorage.setItem("opsDashboardSelected", JSON.stringify(selected));
}

function render(){
  const dashboard = document.getElementById("dashboard");
  const featureList = document.getElementById("featureList");
  const status = document.getElementById("status");

  dashboard.innerHTML = "";
  featureList.innerHTML = "";

  if(!dashboardData || !dashboardData.sections?.length){
    dashboard.innerHTML = '<div class="card empty">No data loaded.</div>';
    status.textContent = "Waiting for data from Tampermonkey or JSON import.";
    return;
  }

  ensureSelection(dashboardData);

  dashboardData.sections.forEach(section => {
    const row = document.createElement("label");
    row.className = "feature";
    row.innerHTML = `
      <input type="checkbox" ${selected[section.id] ? "checked" : ""} data-id="${section.id}">
      <span>${section.icon || "📌"} ${escapeHtml(section.title)}</span>
    `;
    row.querySelector("input").addEventListener("change", e => {
      selected[section.id] = e.target.checked;
      localStorage.setItem("opsDashboardSelected", JSON.stringify(selected));
      render();
    });
    featureList.appendChild(row);

    if(!selected[section.id]) return;

    const card = document.createElement("article");
    card.className = "card";
    const items = Array.isArray(section.items) ? section.items : [];
    card.innerHTML = `
      <div class="card-head">
        <div class="card-title">${section.icon || "📌"} ${escapeHtml(section.title)}</div>
        <span class="badge">${items.length} items</span>
      </div>
      <div class="card-body">
        ${items.length ? items.map(item => `
          <div class="item">
            <a href="${safeUrl(item.link)}" target="_blank">${escapeHtml(item.label || "")}</a>
            <span class="meta">${escapeHtml(item.value || "")}</span>
          </div>
        `).join("") : '<div class="empty">No items</div>'}
      </div>
    `;
    card.querySelector(".card-head").addEventListener("click", () => {
      card.querySelector(".card-body").classList.toggle("hidden");
    });
    dashboard.appendChild(card);
  });

  const time = dashboardData.updatedAt ? new Date(dashboardData.updatedAt).toLocaleString() : "Unknown";
  status.textContent = `Last update: ${time} • ${dashboardData.sections.length} sources loaded`;
}

function escapeHtml(value){
  const div = document.createElement("div");
  div.textContent = String(value ?? "");
  return div.innerHTML;
}

function safeUrl(value){
  const url = String(value || "#");
  return /^(https?:|#)/i.test(url) ? url : "#";
}

function saveData(data){
  dashboardData = data;
  localStorage.setItem("opsDashboardData", JSON.stringify(data));
  render();
}

window.receiveDashboardData = function(data){
  saveData(data);
};

window.addEventListener("message", event => {
  if(event.data?.type === "OPS_DASHBOARD_DATA"){
    saveData(event.data.payload);
  }
});

document.getElementById("fileInput").addEventListener("change", async event => {
  const file = event.target.files[0];
  if(!file) return;
  try{
    const data = JSON.parse(await file.text());
    saveData(data);
  }catch(err){
    alert("Invalid JSON file");
  }
});

document.getElementById("demoBtn").addEventListener("click", () => saveData(defaultData));
document.getElementById("clearBtn").addEventListener("click", () => {
  localStorage.removeItem("opsDashboardData");
  dashboardData = null;
  render();
});
document.getElementById("refreshBtn").addEventListener("click", render);

render();
</script>
</body>
</html>'''
