<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Operations Dashboard</title>
  <style>
    :root{
      --bg:#f4f6f8;--panel:#fff;--text:#17202a;--muted:#667085;
      --line:#e4e7ec;--accent:#ff9900;--shadow:0 10px 30px rgba(16,24,40,.10);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    .app{min-height:100vh;display:grid;grid-template-columns:250px 1fr}
    aside{background:#111827;color:#fff;padding:20px 16px}
    .brand{font-size:20px;font-weight:800;margin-bottom:8px}
    .sub{font-size:13px;color:#9ca3af;margin-bottom:20px}
    .feature{display:flex;gap:10px;align-items:center;padding:10px 8px;border-radius:8px;font-size:14px}
    .feature:hover{background:#1f2937}
    .feature input{accent-color:var(--accent)}
    main{padding:24px;min-width:0}
    .topbar{display:flex;justify-content:space-between;gap:15px;align-items:center;margin-bottom:15px}
    h1{margin:0;font-size:26px}
    .subtitle{margin-top:5px;color:var(--muted);font-size:13px}
    .status{background:#fff;border:1px solid var(--line);padding:11px 13px;border-radius:10px;margin-bottom:14px;font-size:13px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
    .card-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer}
    .card-title{font-weight:800}
    .badge{font-size:12px;padding:4px 8px;border-radius:999px;background:#f2f4f7}
    .card-body{padding:8px 16px 14px}
    .item{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #f0f2f5;font-size:13px}
    .item:last-child{border-bottom:0}
    .item a{color:var(--text);text-decoration:none}
    .item a:hover{text-decoration:underline}
    .meta{color:var(--muted);white-space:nowrap}
    .hidden{display:none!important}
    .empty{padding:24px;text-align:center;color:var(--muted)}
    @media(max-width:900px){
      .app{grid-template-columns:1fr}.grid{grid-template-columns:1fr}
      .topbar{flex-direction:column;align-items:flex-start}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">Ops Dashboard</div>
      <div class="sub">Live data from Tampermonkey</div>
      <div id="featureList"></div>
    </aside>
    <main>
      <div class="topbar">
        <div>
          <h1>Live Operations Dashboard</h1>
          <div class="subtitle">No JSON import. Same-browser live connection.</div>
        </div>
      </div>
      <div id="status" class="status">Waiting for Tampermonkey connection...</div>
      <section id="dashboard" class="grid">
        <div class="card empty">Keep Hacker News open in another tab.</div>
      </section>
    </main>
  </div>

  <script>
    // Tampermonkey will call this function.
    window.renderOpsDashboard = function(data) {
      const dashboard = document.getElementById('dashboard');
      const featureList = document.getElementById('featureList');
      const status = document.getElementById('status');

      dashboard.innerHTML = '';
      featureList.innerHTML = '';

      const selected = JSON.parse(localStorage.getItem('ops-selected') || '{}');

      if (!data || !Array.isArray(data.sections)) {
        dashboard.innerHTML = '<div class="card empty">No live data received yet.</div>';
        return;
      }

      data.sections.forEach(section => {
        if (selected[section.id] === undefined) selected[section.id] = true;

        const option = document.createElement('label');
        option.className = 'feature';
        option.innerHTML = `
          <input type="checkbox" data-id="${section.id}" ${selected[section.id] ? 'checked' : ''}>
          <span>${section.icon || '📌'} ${escapeHtml(section.title)}</span>
        `;
        option.querySelector('input').addEventListener('change', e => {
          selected[section.id] = e.target.checked;
          localStorage.setItem('ops-selected', JSON.stringify(selected));
          window.renderOpsDashboard(data);
        });
        featureList.appendChild(option);

        if (!selected[section.id]) return;

        const items = Array.isArray(section.items) ? section.items : [];
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-head">
            <span class="card-title">${section.icon || '📌'} ${escapeHtml(section.title)}</span>
            <span class="badge">${items.length} items</span>
          </div>
          <div class="card-body">
            ${items.length ? items.map(item => `
              <div class="item">
                <a href="${safeUrl(item.link)}" target="_blank">${escapeHtml(item.label || '')}</a>
                <span class="meta">${escapeHtml(item.value || '')}</span>
              </div>
            `).join('') : '<div class="empty">No items</div>'}
          </div>
        `;
        card.querySelector('.card-head').addEventListener('click', () => {
          card.querySelector('.card-body').classList.toggle('hidden');
        });
        dashboard.appendChild(card);
      });

      localStorage.setItem('ops-selected', JSON.stringify(selected));

      const updated = data.updatedAt ? new Date(data.updatedAt).toLocaleTimeString() : 'Unknown';
      status.textContent = `Connected • Last update: ${updated} • ${data.sections.length} sources`;
    };

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = String(value ?? '');
      return div.innerHTML;
    }

    function safeUrl(value) {
      const url = String(value || '#');
      return /^(https?:|#)/i.test(url) ? url : '#';
    }
  </script>
</body>
</html>
