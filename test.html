<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RANVEXSI UI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --bg:#eef3fb;
    --bg-2:#e7edf8;
    --surface:#ffffff;
    --surface-2:#f7faff;
    --surface-3:#eef5ff;
    --ink:#111827;
    --muted:#6b7280;
    --muted-2:#94a3b8;
    --line:rgba(15,23,42,.10);
    --line-strong:rgba(15,23,42,.16);
    --accent:#2563eb;
    --accent-2:#7c3aed;
    --accent-soft:rgba(37,99,235,.10);
    --green:#16a34a;
    --red:#dc2626;
    --gold:#d97706;

    --shadow-sm:0 6px 16px rgba(15,23,42,.06);
    --shadow-md:0 14px 34px rgba(15,23,42,.10);
    --shadow-lg:0 24px 60px rgba(15,23,42,.14);

    --radius:18px;
    --max:1360px;
  }

  body.dark{
    --bg:#080d19;
    --bg-2:#0c1222;
    --surface:#111827;
    --surface-2:#151f33;
    --surface-3:#1b2942;
    --ink:#eef5ff;
    --muted:#a9b7d0;
    --muted-2:#7486a5;
    --line:rgba(255,255,255,.10);
    --line-strong:rgba(255,255,255,.16);
    --accent:#60a5fa;
    --accent-2:#a78bfa;
    --accent-soft:rgba(96,165,250,.12);
    --shadow-sm:0 8px 18px rgba(0,0,0,.22);
    --shadow-md:0 18px 42px rgba(0,0,0,.32);
    --shadow-lg:0 30px 70px rgba(0,0,0,.42);
  }

  *{
    box-sizing:border-box;
    margin:0;
    padding:0;
  }

  html{
    min-height:100%;
    scroll-behavior:smooth;
  }

  body{
    min-height:100vh;
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at top left, rgba(37,99,235,.12), transparent 34%),
      radial-gradient(circle at top right, rgba(124,58,237,.10), transparent 32%),
      linear-gradient(180deg,var(--bg),var(--bg-2));
    overflow-x:hidden;
  }

  button,
  input,
  select{
    font:inherit;
  }

  button{
    -webkit-tap-highlight-color:transparent;
  }

  a{
    color:inherit;
    text-decoration:none;
  }

  .hidden{
    display:none!important;
  }

  /* =========================
     Header
  ========================= */

  .app-header{
    position:sticky;
    top:0;
    z-index:50;
    border-bottom:1px solid var(--line);
    background:rgba(255,255,255,.84);
    backdrop-filter:blur(22px);
    -webkit-backdrop-filter:blur(22px);
    box-shadow:0 8px 30px rgba(15,23,42,.06);
  }

  body.dark .app-header{
    background:rgba(17,24,39,.84);
    box-shadow:0 8px 34px rgba(0,0,0,.22);
  }

  .header-inner{
    width:min(var(--max),100%);
    margin:0 auto;
    min-height:62px;
    padding:9px 18px;
    display:grid;
    grid-template-columns:auto minmax(260px,1fr) auto;
    align-items:center;
    gap:14px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:11px;
    min-width:230px;
  }

  .backbtn{
    width:36px;
    height:36px;
    border:1px solid var(--line);
    border-radius:13px;
    background:var(--surface);
    color:var(--ink);
    cursor:pointer;
    box-shadow:var(--shadow-sm);
    display:grid;
    place-items:center;
    font-size:17px;
    transition:.18s ease;
  }

  .backbtn:hover{
    transform:translateY(-1px);
    box-shadow:var(--shadow-md);
    border-color:rgba(37,99,235,.28);
  }

  .logo{
    width:40px;
    height:40px;
    border-radius:15px;
    display:grid;
    place-items:center;
    color:white;
    font-weight:950;
    letter-spacing:-.06em;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 14px 34px rgba(37,99,235,.28);
  }

  .brand-text{
    display:flex;
    flex-direction:column;
    gap:2px;
    line-height:1.05;
  }

  .brand-title{
    font-size:1.01rem;
    font-weight:950;
    letter-spacing:-.045em;
  }

  .brand-sub{
    font-size:.62rem;
    color:var(--muted);
    font-weight:700;
    letter-spacing:.01em;
  }

  .search-wrap{
    position:relative;
    width:100%;
    max-width:640px;
    justify-self:center;
  }

  .search-wrap svg{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    color:var(--muted);
    pointer-events:none;
  }

  .search-wrap input{
    width:100%;
    height:40px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.88);
    color:var(--ink);
    outline:none;
    border-radius:15px;
    padding:0 16px 0 43px;
    font-size:.9rem;
    font-weight:700;
    box-shadow:var(--shadow-sm);
    transition:.18s ease;
  }

  body.dark .search-wrap input{
    background:rgba(15,23,42,.74);
  }

  .search-wrap input:focus{
    border-color:rgba(37,99,235,.55);
    box-shadow:0 0 0 4px var(--accent-soft), var(--shadow-sm);
  }

  .header-actions{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:8px;
    min-width:300px;
  }

  .status-pill,
  .views-pill{
    height:34px;
    display:flex;
    align-items:center;
    gap:7px;
    border:1px solid var(--line);
    border-radius:999px;
    background:var(--surface);
    padding:0 10px;
    color:var(--muted);
    font-weight:850;
    font-size:.73rem;
    box-shadow:var(--shadow-sm);
    white-space:nowrap;
  }

  .dot{
    width:8px;
    height:8px;
    border-radius:999px;
    background:var(--muted-2);
  }

  .dot.ok{
    background:var(--green);
    box-shadow:0 0 0 4px rgba(22,163,74,.12);
  }

  .dot.bad{
    background:var(--red);
    box-shadow:0 0 0 4px rgba(220,38,38,.12);
  }

  .iconbtn{
    width:34px;
    height:34px;
    border:1px solid var(--line);
    border-radius:13px;
    background:var(--surface);
    color:var(--ink);
    display:grid;
    place-items:center;
    cursor:pointer;
    box-shadow:var(--shadow-sm);
    transition:.18s ease;
    font-size:15px;
  }

  .iconbtn:hover{
    transform:translateY(-1px);
    box-shadow:var(--shadow-md);
    border-color:rgba(37,99,235,.28);
  }

  .top-link-btn{
    height:34px;
    border:0;
    border-radius:13px;
    padding:0 12px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 10px 22px rgba(37,99,235,.22);
    font-size:.78rem;
    font-weight:950;
    white-space:nowrap;
    transition:.18s ease;
  }

  .top-link-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 14px 28px rgba(37,99,235,.28);
  }

  /* =========================
     Page
  ========================= */

  .page{
    width:min(var(--max),100%);
    margin:0 auto;
    padding:18px 18px 28px;
  }

  .hero-row{
    display:grid;
    grid-template-columns:1fr auto;
    align-items:end;
    gap:16px;
    margin-bottom:14px;
  }

  .crumbs{
    color:var(--muted);
    font-weight:800;
    font-size:.82rem;
    display:flex;
    align-items:center;
    gap:7px;
    flex-wrap:wrap;
  }

  .crumb-link{
    color:var(--muted);
    cursor:pointer;
  }

  .crumb-link:hover{
    color:var(--accent);
  }

  .crumbs b{
    color:var(--ink);
  }

  .page-title{
    margin-top:5px;
    font-size:clamp(1.48rem,2vw,2.05rem);
    letter-spacing:-.06em;
    line-height:1.02;
    font-weight:950;
  }

  .page-note{
    margin-top:7px;
    color:var(--muted);
    font-weight:650;
    max-width:760px;
    font-size:.9rem;
    line-height:1.45;
  }

  .quick-stats{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  .stat-card{
    min-width:106px;
    border:1px solid var(--line);
    border-radius:16px;
    background:rgba(255,255,255,.74);
    backdrop-filter:blur(16px);
    padding:9px 11px;
    box-shadow:var(--shadow-sm);
  }

  body.dark .stat-card{
    background:rgba(17,24,39,.68);
  }

  .stat-label{
    font-size:.62rem;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--muted);
    font-weight:900;
  }

  .stat-value{
    margin-top:3px;
    font-size:1.02rem;
    letter-spacing:-.04em;
    font-weight:950;
  }

  .toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin:0 0 14px;
    flex-wrap:wrap;
  }

  .left-tools,
  .right-tools{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }

  .chip{
    min-height:34px;
    display:inline-flex;
    align-items:center;
    gap:7px;
    border:1px solid var(--line);
    border-radius:999px;
    background:var(--surface);
    color:var(--ink);
    padding:0 11px;
    font-size:.78rem;
    font-weight:850;
    box-shadow:var(--shadow-sm);
  }

  .chip select{
    border:0;
    outline:0;
    background:transparent;
    color:var(--ink);
    font-weight:850;
    cursor:pointer;
  }

  .simple-btn{
    min-height:34px;
    border:1px solid var(--line);
    border-radius:999px;
    background:var(--surface);
    color:var(--ink);
    padding:0 12px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    font-size:.78rem;
    font-weight:900;
    box-shadow:var(--shadow-sm);
    cursor:pointer;
    transition:.18s ease;
  }

  .simple-btn:hover{
    transform:translateY(-1px);
    box-shadow:var(--shadow-md);
  }

  .simple-btn.primary{
    border:0;
    color:white;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
  }

  /* =========================
     Grid
  ========================= */

  .grid{
    display:grid;
    gap:16px;
  }

  #depGrid{
    grid-template-columns:repeat(4,1fr);
  }

  #subGrid{
    grid-template-columns:repeat(5,1fr);
  }

  @media (max-width:1200px){
    #depGrid{
      grid-template-columns:repeat(3,1fr);
    }

    #subGrid{
      grid-template-columns:repeat(4,1fr);
    }
  }

  @media (max-width:820px){
    #depGrid,
    #subGrid{
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }
  }

  /* =========================
     Department Cards
  ========================= */

  .card{
    position:relative;
    min-height:198px;
    aspect-ratio:4/3;
    border:1px solid var(--line);
    border-radius:var(--radius);
    background:var(--surface);
    overflow:hidden;
    cursor:pointer;
    text-decoration:none;
    box-shadow:var(--shadow-sm);
    transform:translateZ(0);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }

  .card:hover{
    transform:translateY(-3px);
    box-shadow:var(--shadow-lg);
    border-color:rgba(37,99,235,.34);
  }

  .card:active{
    transform:translateY(-1px) scale(.993);
  }

  .img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    opacity:.90;
    transform:scale(1.01);
    transition:transform .28s ease, opacity .18s ease;
  }

  body.dark .img{
    opacity:.64;
  }

  .card:hover .img{
    transform:scale(1.04);
  }

  .veil{
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at top left, rgba(37,99,235,.16), transparent 42%),
      linear-gradient(180deg, rgba(0,0,0,.03), rgba(0,0,0,.10));
    pointer-events:none;
  }

  body.dark .veil{
    background:
      radial-gradient(circle at top left, rgba(96,165,250,.18), transparent 42%),
      linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.22));
  }

  .overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,.02) 6%, rgba(0,0,0,.16) 52%, rgba(0,0,0,.78) 100%);
    pointer-events:none;
  }

  .pending-card{
    outline:2px solid rgba(217,119,6,.26);
    outline-offset:-2px;
  }

  .pending-ribbon{
    position:absolute;
    top:10px;
    right:10px;
    z-index:4;
    height:24px;
    padding:0 9px;
    border-radius:999px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:rgba(217,119,6,.92);
    color:#fff;
    font-size:.66rem;
    font-weight:950;
    box-shadow:0 8px 18px rgba(0,0,0,.20);
    backdrop-filter:blur(10px);
  }

  .vote-mini{
    position:absolute;
    z-index:5;
    left:10px;
    top:10px;
    min-width:48px;
    height:28px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.28);
    background:rgba(255,255,255,.20);
    color:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:5px;
    padding:0 10px;
    font-size:.75rem;
    font-weight:950;
    cursor:pointer;
    backdrop-filter:blur(12px);
    box-shadow:0 8px 18px rgba(0,0,0,.14);
    transition:.16s ease;
  }

  .vote-mini:hover{
    background:rgba(255,255,255,.28);
    transform:translateY(-1px);
  }

  .vote-mini:disabled{
    cursor:wait;
    opacity:.75;
  }

  .vote-mini.voted{
    background:rgba(255,255,255,.20);
    color:#fff;
    border-color:rgba(255,255,255,.28);
  }

  .label{
    position:absolute;
    z-index:2;
    left:13px;
    right:13px;
    bottom:12px;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:10px;
    color:white;
  }

  .label-main{
    min-width:0;
  }

  .label-title{
    display:block;
    font-size:.98rem;
    line-height:1.1;
    font-weight:950;
    letter-spacing:-.035em;
    text-shadow:0 2px 10px rgba(0,0,0,.42);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .label-sub{
    margin-top:4px;
    display:block;
    font-size:.73rem;
    color:rgba(255,255,255,.82);
    font-weight:800;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    text-shadow:0 2px 8px rgba(0,0,0,.38);
  }

  .pill{
    flex:0 0 auto;
    display:inline-flex;
    align-items:center;
    gap:6px;
    height:25px;
    padding:0 9px;
    border-radius:999px;
    background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.22);
    color:white;
    font-size:.69rem;
    font-weight:950;
    backdrop-filter:blur(10px);
    box-shadow:0 6px 18px rgba(0,0,0,.15);
  }

  /* =========================
     Sub Department Chips
  ========================= */

  .subchip{
    min-height:118px;
    border:1px solid var(--line);
    border-radius:18px;
    background:
      linear-gradient(135deg, rgba(37,99,235,.10), rgba(124,58,237,.08)),
      var(--surface);
    box-shadow:var(--shadow-sm);
    padding:15px;
    cursor:pointer;
    transition:.18s ease;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    gap:12px;
    position:relative;
    overflow:hidden;
  }

  .subchip:hover{
    transform:translateY(-3px);
    border-color:rgba(37,99,235,.35);
    box-shadow:var(--shadow-md);
  }

  .subchip.all{
    background:
      radial-gradient(circle at top left, rgba(37,99,235,.14), transparent 48%),
      linear-gradient(135deg, rgba(37,99,235,.12), rgba(124,58,237,.10)),
      var(--surface);
  }

  .sub-top{
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:flex-start;
  }

  .sub-icon{
    width:36px;
    height:36px;
    border-radius:14px;
    display:grid;
    place-items:center;
    color:white;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 12px 24px rgba(37,99,235,.22);
    font-size:17px;
    font-weight:950;
  }

  .sub-count{
    height:27px;
    min-width:34px;
    padding:0 9px;
    border-radius:999px;
    display:grid;
    place-items:center;
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--muted);
    font-weight:950;
    font-size:.74rem;
  }

  .sub-title{
    font-weight:950;
    letter-spacing:-.04em;
    line-height:1.12;
    font-size:1rem;
  }

  .sub-desc{
    color:var(--muted);
    font-size:.76rem;
    font-weight:750;
    margin-top:5px;
  }

  .empty{
    grid-column:1/-1;
    border:1px dashed var(--line-strong);
    border-radius:20px;
    background:rgba(255,255,255,.70);
    padding:28px 18px;
    text-align:center;
    color:var(--muted);
    box-shadow:var(--shadow-sm);
    font-weight:800;
    line-height:1.5;
  }

  body.dark .empty{
    background:rgba(17,24,39,.62);
  }

  .empty strong{
    color:var(--ink);
    font-size:1.05rem;
  }

  /* =========================
     Responsive
  ========================= */

  @media (max-width:980px){
    .header-inner{
      grid-template-columns:1fr auto;
      gap:10px;
      padding:9px 14px;
    }

    .brand{
      min-width:0;
    }

    .search-wrap{
      grid-column:1 / -1;
      grid-row:2;
      max-width:none;
    }

    .header-actions{
      min-width:0;
      gap:7px;
    }

    .status-pill,
    .views-pill{
      display:none;
    }

    .top-link-btn{
      height:34px;
      padding:0 10px;
      font-size:.76rem;
    }

    .page{
      padding:15px 14px 26px;
    }

    .hero-row{
      grid-template-columns:1fr;
      align-items:start;
    }

    .quick-stats{
      justify-content:flex-start;
    }

    .stat-card{
      min-width:calc(33.333% - 7px);
      flex:1;
    }

    .card{
      min-height:152px;
      border-radius:17px;
      aspect-ratio:1.05;
    }

    .label{
      left:11px;
      right:11px;
      bottom:10px;
      align-items:flex-start;
      flex-direction:column;
      gap:7px;
    }

    .label-title{
      font-size:.86rem;
      white-space:normal;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
    }

    .label-sub{
      display:none;
    }

    .pill{
      height:23px;
      font-size:.66rem;
      padding:0 8px;
    }

    .vote-mini{
      height:26px;
      min-width:44px;
      padding:0 9px;
      font-size:.7rem;
    }

    .subchip{
      min-height:108px;
      border-radius:17px;
      padding:14px;
    }
  }

  @media (max-width:520px){
    .logo{
      width:38px;
      height:38px;
      border-radius:14px;
    }

    .brand-title{
      font-size:.93rem;
    }

    .brand-sub{
      font-size:.58rem;
    }

    .iconbtn{
      width:34px;
      height:34px;
      border-radius:13px;
    }

    .page-title{
      font-size:1.38rem;
    }

    .page-note{
      font-size:.86rem;
    }

    #depGrid,
    #subGrid{
      grid-template-columns:repeat(2,minmax(0,1fr));
    }

    .stat-card{
      min-width:calc(33.333% - 6px);
      padding:8px 9px;
    }

    .stat-label{
      font-size:.56rem;
    }

    .stat-value{
      font-size:.92rem;
    }

    .toolbar{
      align-items:stretch;
    }

    .left-tools,
    .right-tools{
      width:100%;
    }

    .simple-btn,
    .chip{
      flex:1;
      justify-content:center;
    }
  }
</style>
</head>

<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <button id="btnBack" class="backbtn hidden" title="Back">←</button>

/* =========================================================
   Helpers
========================================================= */

function esc(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function safeUrl(url){
  const u = String(url || "").trim();
  if(!u || u === "#") return "#";
  if(u.startsWith("http://") || u.startsWith("https://") || u.startsWith("mailto:") || u.startsWith("tel:")) return u;
  return "https://" + u;
}

function getPublicImage(path){
  const p = String(path || "").trim();
  if(!p || p === "null" || p === "undefined") return "";
  const { data } = db.storage.from(STORAGE_BUCKET).getPublicUrl(p);
  return data?.publicUrl || "";
}

function firstGood(...values){
  for(const v of values){
    const s = String(v || "").trim();
    if(s && s !== "null" && s !== "undefined") return s;
  }
  return "";
}

function imageFromRow(row){
  return firstGood(row.ImageURL, row.image_url, getPublicImage(row.ImagePath || row.image_path));
}

function departmentImageFromRow(row){
  return firstGood(
    row.DIURL,
    row.department_image_url,
    getPublicImage(row.DepartmentImagePath || row.department_image_path),
    row.ImageURL,
    row.image_url,
    getPublicImage(row.ImagePath || row.image_path)
  );
}

function fallbackImage(text){
  return `https://source.unsplash.com/1200x800/?warehouse,workplace,tools,${encodeURIComponent(text || "department")}`;
}

function setDbStatus(type, text){
  els.dbText.textContent = text;
  els.dbDot.classList.remove("ok","bad");

  if(type === "ok") els.dbDot.classList.add("ok");
  if(type === "bad") els.dbDot.classList.add("bad");
}

function countLinksInSub(dep, sub){
  return rawRows.filter(r => r.Department === dep && r.SubDepartment === sub).length;
}

function countAllLinksInDepartment(dep){
  return rawRows.filter(r => r.Department === dep).length;
}

function allSubsCount(){
  return departmentsData.reduce((sum, d) => sum + (d.subs?.length || 0), 0);
}

function getLocalRequests(){
  try{
    const rows = JSON.parse(localStorage.getItem(LS.LOCAL_REQUESTS) || "[]");
    return Array.isArray(rows) ? rows : [];
  }catch{
    return [];
  }
}

function localRequestsFor(type){
  return localRequests.filter(r => r.request_type === type && r.status !== "rejected");
}

function makeVoterKey(){
  const existing = localStorage.getItem(LS.VOTER_KEY);
  if(existing) return existing;

  let key = "";

  if(window.crypto && crypto.randomUUID){
    key = crypto.randomUUID();
  }else{
    key = "rv_" + Date.now() + "_" + Math.random().toString(36).slice(2);
  }

  localStorage.setItem(LS.VOTER_KEY, key);
  return key;
}

function getVoterKey(){
  return makeVoterKey();
}

function buildUrl(page, params){
  const url = new URL(page, window.location.href);

  Object.entries(params || {}).forEach(([key, value]) => {
    if(value !== null && value !== undefined && String(value).trim() !== ""){
      url.searchParams.set(key, String(value));
    }
  });

  return url.pathname.split("/").pop() + url.search;
}

function updateRequestLink(){
  const params = {};
  if(currentDep) params.dep = currentDep;
  els.btnRequestTop.href = buildUrl("request.html", params);
}

function updateStats(){
  els.statDepartments.textContent = departmentsData.length;
  els.statSubs.textContent = allSubsCount();
  els.statLinks.textContent = rawRows.length;
}

/* =========================================================
   Theme / Prefs
========================================================= */

function initTheme(){
  let saved = localStorage.getItem(LS.THEME);

  if(!saved){
    saved = "light";
    localStorage.setItem(LS.THEME, saved);
  }

  document.body.classList.toggle("dark", saved === "dark");
}

function toggleTheme(){
  const dark = !document.body.classList.contains("dark");
  document.body.classList.toggle("dark", dark);
  localStorage.setItem(LS.THEME, dark ? "dark" : "light");
}

function initPrefs(){
  const density = localStorage.getItem(LS.DENSITY) || "comfort";
  const media = localStorage.getItem(LS.MEDIA) || "on";

  els.density.value = density;
  els.media.value = media;

  applyDensity(density);
  applyMedia(media);
}

function applyDensity(value){
  const root = document.documentElement;

  if(value === "compact"){
    root.style.setProperty("--radius", "15px");
  }else if(value === "large"){
    root.style.setProperty("--radius", "22px");
  }else{
    root.style.setProperty("--radius", "18px");
  }
}

function applyMedia(value){
  document.querySelectorAll(".img").forEach(img => {
    img.style.display = value === "off" ? "none" : "block";
  });
}

/* =========================================================
   Views / Analytics
========================================================= */

function todayKey(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function updateViewUI(today, total){
  els.viewsToday.textContent = String(today || 0);
  els.viewsTotal.textContent = String(total || 0);
}

async function trackVisit(){
  try{
    const { data, error } = await db.rpc("rv_track_visit");
    if(error) throw error;

    const today = Number(data?.daily_steps || data?.daily_views || 0);
    const total = Number(data?.total_views || 0);

    analyticsReady = true;
    updateViewUI(today, total);
  }catch(err){
    console.warn("Supabase analytics not ready, using local fallback:", err.message || err);

    const key = todayKey();
    const saved = JSON.parse(localStorage.getItem(LS.LOCAL_DAILY_VIEWS) || "{}");

    if(saved.date !== key){
      saved.date = key;
      saved.count = 0;
    }

    saved.count = Number(saved.count || 0) + 1;

    const total = Number(localStorage.getItem(LS.LOCAL_TOTAL_VIEWS) || 0) + 1;

    localStorage.setItem(LS.LOCAL_DAILY_VIEWS, JSON.stringify(saved));
    localStorage.setItem(LS.LOCAL_TOTAL_VIEWS, String(total));

    updateViewUI(saved.count, total);
  }
}

/* =========================================================
   Normalize
========================================================= */

function normalizeDepartment(row){
  return {
    ID: row.id || "",
    Department: String(row.department ?? row.Department ?? "").trim(),
    ImageURL: String(row.image_url ?? row.ImageURL ?? "").trim(),
    ImagePath: String(row.image_path ?? row.ImagePath ?? "").trim(),
    Color: String(row.color ?? row.Color ?? "").trim(),
    SortOrder: Number(row.sort_order ?? row.SortOrder ?? 0),
    IsActive: row.is_active ?? row.IsActive ?? true
  };
}

function normalizeSubDepartment(row){
  return {
    ID: row.id || "",
    Department: String(row.department ?? row.Department ?? "").trim(),
    SubDepartment: String(row.sub_department ?? row.SubDepartment ?? "").trim(),
    SortOrder: Number(row.sort_order ?? row.SortOrder ?? 0),
    IsActive: row.is_active ?? row.IsActive ?? true
  };
}

function normalizeRow(row){
  return {
    ID: row.id || "",
    Department: String(row.department ?? row.Department ?? "").trim(),
    SubDepartment: String(row.sub_department ?? row.SubDepartment ?? "").trim(),
    DIURL: String(row.department_image_url ?? row.DIURL ?? "").trim(),
    LinkName: String(row.link_name ?? row.LinkName ?? "Unnamed").trim(),
    URL: String(row.url ?? row.URL ?? "#").trim(),
    Color: String(row.color ?? row.Color ?? "").trim(),
    ImageURL: String(row.image_url ?? row.ImageURL ?? "").trim(),
    ImagePath: String(row.image_path ?? row.ImagePath ?? "").trim(),
    DepartmentImagePath: String(row.department_image_path ?? row.DepartmentImagePath ?? "").trim(),
    SortOrder: Number(row.sort_order ?? row.SortOrder ?? 0),
    IsActive: row.is_active ?? row.IsActive ?? true
  };
}

/* =========================================================
   Data Loading
========================================================= */

async function loadData(){
  setDbStatus("", "Loading");

  try{
    const { data, error } = await db
      .from(SUPABASE_TABLE)
      .select("*")
      .eq("is_active", true)
      .order("department", { ascending:true })
      .order("sub_department", { ascending:true })
      .order("sort_order", { ascending:true })
      .order("link_name", { ascending:true });

    if(error) throw error;

    rawRows = (data || [])
      .map(normalizeRow)
      .filter(row => row.Department && row.LinkName);

    try{
      const { data: depData, error: depError } = await db
        .from(DEPT_TABLE)
        .select("*")
        .eq("is_active", true)
        .order("sort_order", { ascending:true })
        .order("department", { ascending:true });

      if(depError) throw depError;

      departmentRows = (depData || [])
        .map(normalizeDepartment)
        .filter(d => d.Department);
    }catch(depErr){
      console.warn("Department table not available yet. Using link departments only:", depErr.message || depErr);
      departmentRows = [];
    }

    try{
      const { data: subData, error: subError } = await db
        .from(SUB_TABLE)
        .select("*")
        .eq("is_active", true)
        .order("sort_order", { ascending:true })
        .order("sub_department", { ascending:true });

      if(subError) throw subError;

      subDepartmentRows = (subData || [])
        .map(normalizeSubDepartment)
        .filter(s => s.Department && s.SubDepartment);
    }catch(subErr){
      console.warn("Sub-department table not available yet. Using link sub-departments only:", subErr.message || subErr);
      subDepartmentRows = [];
    }

    localRequests = getLocalRequests();

    buildMaps();
    await loadVoteCounts();
    render();

    setDbStatus("ok", `${rawRows.length} links`);
  }catch(e){
    console.error(e);

    setDbStatus("bad", "DB error");

    els.depGrid.classList.remove("hidden");
    els.subGrid.classList.add("hidden");

    els.depGrid.innerHTML = `
      <div class="empty">
        <strong>Failed to load Supabase data.</strong><br>
        ${esc(e.message || e)}<br><br>
        Check table name, columns, and RLS SELECT policy.
      </div>
    `;
  }
}

function buildMaps(){
  const map = {};

  function ensureDep(dep, imageUrl="", sortOrder=999999, pending=false){
    if(!dep) return null;

    if(!map[dep]){
      map[dep] = {
        dep,
        subs:[],
        imageUrl:imageUrl || "",
        totalLinks:0,
        sortOrder:Number(sortOrder || 999999),
        pending:!!pending,
        pendingSubs:new Set()
      };
    }

    if(imageUrl && !map[dep].imageUrl){
      map[dep].imageUrl = imageUrl;
    }

    if(pending){
      map[dep].pending = true;
    }

    return map[dep];
  }

  function addSub(dep, sub, pending=false){
    const d = ensureDep(dep, "", 999999, false);

    if(!d || !sub) return;

    if(!d.subs.includes(sub)){
      d.subs.push(sub);
    }

    if(pending){
      d.pendingSubs.add(sub);
    }
  }

  departmentRows.forEach(row => {
    const depImg = firstGood(row.ImageURL, getPublicImage(row.ImagePath));
    ensureDep(row.Department, depImg, row.SortOrder || 0, false);
  });

  subDepartmentRows.forEach(row => {
    ensureDep(row.Department, "", row.SortOrder || 0, false);
    addSub(row.Department, row.SubDepartment, false);
  });

  rawRows.forEach(row => {
    const dep = row.Department;
    const sub = row.SubDepartment;
    const depImg = departmentImageFromRow(row);
    const d = ensureDep(dep, depImg, 999999, false);

    if(d && depImg && !d.imageUrl){
      d.imageUrl = depImg;
    }

    if(sub){
      addSub(dep, sub, false);
    }

    if(d){
      d.totalLinks++;
    }
  });

  localRequestsFor("department").forEach(req => {
    ensureDep(
      req.department,
      firstGood(req.department_image_url, req.image_url),
      999998,
      true
    );
  });

  localRequestsFor("sub_department").forEach(req => {
    ensureDep(req.department, "", 999998, false);
    addSub(req.department, req.sub_department, true);
  });

  localRequestsFor("link").forEach(req => {
    const d = ensureDep(req.department, "", 999998, false);
    addSub(req.department, req.sub_department || "General", true);

    if(d){
      d.totalLinks++;
    }
  });

  departmentsData = Object.values(map)
    .map(d => ({
      ...d,
      subs: d.subs.sort((a,b) => a.localeCompare(b)),
      pendingSubs:[...d.pendingSubs],
      imageUrl: d.imageUrl || fallbackImage(d.dep)
    }))
    .sort((a,b) => (a.sortOrder - b.sortOrder) || a.dep.localeCompare(b.dep));

  updateStats();
}

/* =========================================================
   Vote Logic
========================================================= */

async function loadVoteCounts(){
  voteCounts = {};
  userVoteStatus = {};

  try{
    const { data, error } = await db.rpc("rv_public_department_vote_counts");
    if(error) throw error;

    (data || []).forEach(row => {
      voteCounts[row.department] = Number(row.total_votes || 0);
    });
  }catch(err){
    console.warn("Could not load vote counts:", err.message || err);
  }

  try{
    const voterKey = getVoterKey();

    const { data, error } = await db.rpc("rv_public_department_vote_statuses", {
      p_voter_key: voterKey
    });

    if(error) throw error;

    (data || []).forEach(row => {
      userVoteStatus[row.department] = !!row.has_voted;
    });
  }catch(err){
    console.warn("Could not load vote status:", err.message || err);
  }
}

function getVoteCount(dep){
  return Number(voteCounts[dep] || 0);
}

function hasVoted(dep){
  return !!userVoteStatus[dep];
}

async function voteDepartment(dep, button){
  if(!dep || !button) return;

  const oldText = button.innerHTML;
  button.disabled = true;
  button.innerHTML = `...`;

  try{
    const voterKey = getVoterKey();

    const { data, error } = await db.rpc("rv_public_vote_department", {
      p_department: dep,
      p_voter_key: voterKey
    });

    if(error) throw error;

    const first = Array.isArray(data) ? data[0] : data;

    if(first){
      voteCounts[dep] = Number(first.total_votes || getVoteCount(dep));
      userVoteStatus[dep] = true;
    }else{
      voteCounts[dep] = getVoteCount(dep) + 1;
      userVoteStatus[dep] = true;
    }

    renderDepartments(false);
  }catch(err){
    console.error(err);
    alert("Could not save vote. Please try again.");
    button.disabled = false;
    button.innerHTML = oldText;
  }
}

/* =========================================================
   Render
========================================================= */

function render(){
  updateRequestLink();

  if(currentMode === "departments"){
    renderDepartments();
  }else{
    renderSubDepartments();
  }

  applyMedia(els.media.value);
}

function updateHeroForDepartments(){
  els.btnBack.classList.add("hidden");
  els.btnOpenAllLinks.classList.add("hidden");

  els.crumbs.innerHTML = "Home";
  els.pageTitle.textContent = "Departments";
  els.pageNote.textContent = "Choose a department, then open the right sub-department to see your workplace links.";

  els.depGrid.classList.remove("hidden");
  els.subGrid.classList.add("hidden");
}

function updateHeroForSubDepartments(){
  els.btnBack.classList.remove("hidden");
  els.btnOpenAllLinks.classList.remove("hidden");

  els.crumbs.innerHTML = `<span class="crumb-link" id="crumbHome">Home</span> / <b>${esc(currentDep)}</b>`;
  els.pageTitle.textContent = currentDep || "Sub-Departments";
  els.pageNote.textContent = "Choose a sub-department. Links will open on the faster links page.";

  els.depGrid.classList.add("hidden");
  els.subGrid.classList.remove("hidden");

  const crumbHome = document.getElementById("crumbHome");
  if(crumbHome){
    crumbHome.addEventListener("click", goHome);
  }
}

function renderDepartments(updateHero=true){
  currentMode = "departments";
  currentDep = null;

  if(updateHero){
    updateHeroForDepartments();
  }

  updateRequestLink();

  const q = els.search.value.trim().toLowerCase();

  let data = departmentsData;

  if(q){
    data = data.filter(d =>
      d.dep.toLowerCase().includes(q) ||
      d.subs.some(s => s.toLowerCase().includes(q))
    );
  }

  els.depGrid.innerHTML = "";

  if(data.length === 0){
    els.depGrid.innerHTML = `
      <div class="empty">
        <strong>No departments found.</strong><br>
        Use the request page to submit a new department.
      </div>
    `;
    return;
  }

  data.forEach(d => {
    const votes = getVoteCount(d.dep);
    const voted = hasVoted(d.dep);

    const card = document.createElement("div");
    card.className = "card" + (d.pending ? " pending-card" : "");
    card.dataset.id = d.dep;

    card.innerHTML = `
      <img class="img" loading="lazy" decoding="async" src="${esc(d.imageUrl)}" alt="${esc(d.dep)}">
      <div class="veil"></div>
      <div class="overlay"></div>

      <button class="vote-mini ${voted ? "voted" : ""}" type="button" title="Vote for ${esc(d.dep)}">
        👍 <span>${votes}</span>
      </button>

      ${d.pending ? `<div class="pending-ribbon">Pending</div>` : ``}

      <div class="label">
        <div class="label-main">
          <span class="label-title">${esc(d.dep)}</span>
          <span class="label-sub">${d.pending ? "Waiting for admin approval" : `${d.totalLinks} links inside`}</span>
        </div>
        <span class="pill">${d.pending ? "Pending" : `${d.subs.length} subs`}</span>
      </div>
    `;

    card.addEventListener("click", () => {
      currentDep = d.dep;
      currentMode = "subdepartments";
      els.search.value = "";
      renderSubDepartments();
    });

    const voteBtn = card.querySelector(".vote-mini");

    voteBtn.addEventListener("click", async (event) => {
      event.stopPropagation();
      event.preventDefault();
      await voteDepartment(d.dep, voteBtn);
    });

    els.depGrid.appendChild(card);
  });
}

function renderSubDepartments(){
  currentMode = "subdepartments";

  if(!currentDep){
    goHome();
    return;
  }

  updateHeroForSubDepartments();
  updateRequestLink();

  const depObj = departmentsData.find(d => d.dep === currentDep);

  if(!depObj){
    goHome();
    return;
  }

  const q = els.search.value.trim().toLowerCase();
  const subs = depObj.subs || [];

  let filtered = q
    ? subs.filter(s => s.toLowerCase().includes(q))
    : subs;

  els.subGrid.innerHTML = "";

  const totalLinks = countAllLinksInDepartment(currentDep);

  if(totalLinks > 0){
    const allChip = document.createElement("div");
    allChip.className = "subchip all";

    allChip.innerHTML = `
      <div class="sub-top">
        <div class="sub-icon">★</div>
        <div class="sub-count">${totalLinks}</div>
      </div>
      <div>
        <div class="sub-title">All Links</div>
        <div class="sub-desc">Open every link under ${esc(currentDep)}</div>
      </div>
    `;

    allChip.addEventListener("click", () => {
      window.location.href = buildUrl("links.html", {
        dep: currentDep,
        sub: "__all__"
      });
    });

    if(!q || "all links".includes(q)){
      els.subGrid.appendChild(allChip);
    }
  }

  if(filtered.length === 0 && (!q || !"all links".includes(q))){
    els.subGrid.innerHTML = `
      <div class="empty">
        <strong>No sub-departments found.</strong><br>
        Use the request page to submit a new sub-department.
      </div>
    `;
    return;
  }

  filtered.forEach(sub => {
    const isPendingSub = depObj.pendingSubs?.includes(sub);

    const chip = document.createElement("div");
    chip.className = "subchip" + (isPendingSub ? " pending-card" : "");

    chip.innerHTML = `
      <div class="sub-top">
        <div class="sub-icon">↗</div>
        <div class="sub-count">${countLinksInSub(currentDep, sub)}</div>
      </div>

      ${isPendingSub ? `<div class="pending-ribbon">Pending</div>` : ``}

      <div>
        <div class="sub-title">${esc(sub)}</div>
        <div class="sub-desc">${isPendingSub ? "Waiting for admin approval" : "Open links and tools"}</div>
      </div>
    `;

    chip.addEventListener("click", () => {
      window.location.href = buildUrl("links.html", {
        dep: currentDep,
        sub
      });
    });

    els.subGrid.appendChild(chip);
  });
}

function goHome(){
  currentDep = null;
  currentMode = "departments";
  els.search.value = "";
  renderDepartments();
}

function goBack(){
  if(currentMode === "subdepartments"){
    goHome();
  }
}

function openAllLinks(){
  if(!currentDep) return;

  window.location.href = buildUrl("links.html", {
    dep: currentDep,
    sub: "__all__"
  });
}

/* =========================================================
   Gallery
========================================================= */

function fallbackGalleryFromLinks(){
  const seen = new Set();
  const items = [];

  rawRows.forEach(row => {
    const url = firstGood(imageFromRow(row), departmentImageFromRow(row));

    if(!url || seen.has(url)) return;

    seen.add(url);

    items.push({
      id:"",
      title: row.LinkName || row.Department || "Existing image",
      category: row.Department || "",
      url
    });
  });

  return items.slice(0, 100);
}

async function loadGallery(){
  const fallback = fallbackGalleryFromLinks();

  try{
    const { data, error } = await db
      .from(GALLERY_TABLE)
      .select("id,title,category,image_url,image_path,is_active")
      .eq("is_active", true)
      .order("created_at", { ascending:false })
      .limit(120);

    if(error) throw error;

    const fromTable = (data || [])
      .map(item => {
        const url = firstGood(item.image_url, getPublicImage(item.image_path));

        return {
          id:item.id || "",
          title:item.title || "Gallery image",
          category:item.category || "",
          url
        };
      })
      .filter(x => x.url);

    const merged = [];
    const seen = new Set();

    [...fromTable, ...fallback].forEach(item => {
      if(!item.url || seen.has(item.url)) return;
      seen.add(item.url);
      merged.push(item);
    });

    galleryImages = merged;
  }catch(e){
    console.warn("Gallery table not available, using existing link images:", e.message || e);
    galleryImages = fallback;
  }
}

/* =========================================================
   Realtime
========================================================= */

function setupRealtime(){
  realtimeChannels.forEach(ch => {
    try{
      db.removeChannel(ch);
    }catch{}
  });

  realtimeChannels = [];

  const tables = [
    SUPABASE_TABLE,
    DEPT_TABLE,
    SUB_TABLE,
    REQUEST_TABLE,
    GALLERY_TABLE,
    VOTES_TABLE
  ];

  tables.forEach(table => {
    try{
      const channel = db
        .channel(`rv-index-live-${table}`)
        .on(
          "postgres_changes",
          { event:"*", schema:"public", table },
          async () => {
            await loadData();
          }
        )
        .subscribe();

      realtimeChannels.push(channel);
    }catch(e){
      console.warn("Realtime not started for", table, e);
    }
  });
}

/* =========================================================
   Events
========================================================= */

els.btnTheme.addEventListener("click", toggleTheme);

els.btnRefresh.addEventListener("click", async () => {
  await loadData();
});

els.btnBack.addEventListener("click", goBack);
els.btnHome.addEventListener("click", goHome);
els.btnOpenAllLinks.addEventListener("click", openAllLinks);

els.density.addEventListener("change", () => {
  localStorage.setItem(LS.DENSITY, els.density.value);
  applyDensity(els.density.value);
});

els.media.addEventListener("change", () => {
  localStorage.setItem(LS.MEDIA, els.media.value);
  applyMedia(els.media.value);
});

let searchTimer = null;

els.search.addEventListener("input", () => {
  clearTimeout(searchTimer);

  searchTimer = setTimeout(() => {
    if(currentMode === "departments"){
      renderDepartments();
    }else{
      renderSubDepartments();
    }
  }, 150);
});

document.addEventListener("keydown", (event) => {
  if(event.key === "Escape" && currentMode === "subdepartments"){
    goHome();
  }
});

/* =========================================================
   Init
========================================================= */

async function init(){
  initTheme();
  initPrefs();
  trackVisit();
  await loadData();
  await loadGallery();
  setupRealtime();
}

init();
</script>
