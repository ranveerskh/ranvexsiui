<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RANVEXSI UI — Links</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --bg:#eef3fb;
    --bg-2:#e7edf8;
    --surface:#ffffff;
    --surface-2:#f7faff;
    --surface-3:#eef5ff;
    --ink:#111827;
    --muted:#6b7280;
    --muted-2:#94a3b8;
    --line:rgba(15,23,42,.10);
    --line-strong:rgba(15,23,42,.16);
    --accent:#2563eb;
    --accent-2:#7c3aed;
    --accent-soft:rgba(37,99,235,.10);
    --green:#16a34a;
    --red:#dc2626;
    --gold:#d97706;
    --shadow-sm:0 6px 16px rgba(15,23,42,.06);
    --shadow-md:0 14px 34px rgba(15,23,42,.10);
    --shadow-lg:0 24px 60px rgba(15,23,42,.14);
    --radius:18px;
    --max:1360px;
  }

  body.dark{
    --bg:#080d19;
    --bg-2:#0c1222;
    --surface:#111827;
    --surface-2:#151f33;
    --surface-3:#1b2942;
    --ink:#eef5ff;
    --muted:#a9b7d0;
    --muted-2:#7486a5;
    --line:rgba(255,255,255,.10);
    --line-strong:rgba(255,255,255,.16);
    --accent:#60a5fa;
    --accent-2:#a78bfa;
    --accent-soft:rgba(96,165,250,.12);
    --shadow-sm:0 8px 18px rgba(0,0,0,.22);
    --shadow-md:0 18px 42px rgba(0,0,0,.32);
    --shadow-lg:0 30px 70px rgba(0,0,0,.42);
  }

  *{
    box-sizing:border-box;
    margin:0;
    padding:0;
  }

  html{
    min-height:100%;
    scroll-behavior:smooth;
  }

  body{
    min-height:100vh;
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at top left, rgba(37,99,235,.12), transparent 34%),
      radial-gradient(circle at top right, rgba(124,58,237,.10), transparent 32%),
      linear-gradient(180deg,var(--bg),var(--bg-2));
    overflow-x:hidden;
  }

  button,
  input,
  select,
  textarea{
    font:inherit;
  }

  button{
    -webkit-tap-highlight-color:transparent;
  }

  textarea{
    resize:vertical;
  }

  a{
    color:inherit;
    text-decoration:none;
  }

  .hidden{
    display:none!important;
  }

  /* =========================
     Header
  ========================= */

  .app-header{
    position:sticky;
    top:0;
    z-index:50;
    border-bottom:1px solid var(--line);
    background:rgba(255,255,255,.84);
    backdrop-filter:blur(22px);
    -webkit-backdrop-filter:blur(22px);
    box-shadow:0 8px 30px rgba(15,23,42,.06);
  }

  body.dark .app-header{
    background:rgba(17,24,39,.84);
    box-shadow:0 8px 34px rgba(0,0,0,.22);
  }

  .header-inner{
    width:min(var(--max),100%);
    margin:0 auto;
    min-height:62px;
    padding:9px 18px;
    display:grid;
    grid-template-columns:auto minmax(260px,1fr) auto;
    align-items:center;
    gap:14px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:11px;
    min-width:230px;
  }

  .backbtn{
    width:36px;
    height:36px;
    border:1px solid var(--line);
    border-radius:13px;
    background:var(--surface);
    color:var(--ink);
    cursor:pointer;
    box-shadow:var(--shadow-sm);
    display:grid;
    place-items:center;
    font-size:17px;
    transition:.18s ease;
  }

  .backbtn:hover{
    transform:translateY(-1px);
    box-shadow:var(--shadow-md);
    border-color:rgba(37,99,235,.28);
  }

  .logo{
    width:40px;
    height:40px;
    border-radius:15px;
    display:grid;
    place-items:center;
    color:white;
    font-weight:950;
    letter-spacing:-.06em;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 14px 34px rgba(37,99,235,.28);
  }

  .brand-text{
    display:flex;
    flex-direction:column;
    gap:2px;
    line-height:1.05;
  }

  .brand-title{
    font-size:1.01rem;
    font-weight:950;
    letter-spacing:-.045em;
  }

  .brand-sub{
    font-size:.62rem;
    color:var(--muted);
    font-weight:700;
    letter-spacing:.01em;
  }

  .search-wrap{
    position:relative;
    width:100%;
    max-width:640px;
    justify-self:center;
  }

  .search-wrap svg{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    color:var(--muted);
    pointer-events:none;
  }

  .search-wrap input{
    width:100%;
    height:40px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.88);
    color:var(--ink);
    outline:none;
    border-radius:15px;
    padding:0 16px 0 43px;
    font-size:.9rem;
    font-weight:700;
    box-shadow:var(--shadow-sm);
    transition:.18s ease;
  }

  body.dark .search-wrap input{
    background:rgba(15,23,42,.74);
  }

  .search-wrap input:focus{
    border-color:rgba(37,99,235,.55);
    box-shadow:0 0 0 4px var(--accent-soft), var(--shadow-sm);
  }

  .header-actions{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:8px;
    min-width:270px;
  }

  .status-pill{
    height:34px;
    display:flex;
    align-items:center;
    gap:7px;
    border:1px solid var(--line);
    border-radius:999px;
    background:var(--surface);
    padding:0 10px;
    color:var(--muted);
    font-weight:850;
    font-size:.73rem;
    box-shadow:var(--shadow-sm);
    white-space:nowrap;
  }

  .dot{
    width:8px;
    height:8px;
    border-radius:999px;
    background:var(--muted-2);
  }

  .dot.ok{
    background:var(--green);
    box-shadow:0 0 0 4px rgba(22,163,74,.12);
  }

  .dot.bad{
    background:var(--red);
    box-shadow:0 0 0 4px rgba(220,38,38,.12);
  }

  .iconbtn{
    width:34px;
    height:34px;
    border:1px solid var(--line);
    border-radius:13px;
    background:var(--surface);
    color:var(--ink);
    display:grid;
    place-items:center;
    cursor:pointer;
    box-shadow:var(--shadow-sm);
    transition:.18s ease;
    font-size:15px;
  }

  .iconbtn:hover{
    transform:translateY(-1px);
    box-shadow:var(--shadow-md);
    border-color:rgba(37,99,235,.28);
  }

  .top-link-btn{
    height:34px;
    border:0;
    border-radius:13px;
    padding:0 12px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 10px 22px rgba(37,99,235,.22);
    font-size:.78rem;
    font-weight:950;
    white-space:nowrap;
    transition:.18s ease;
  }

  .top-link-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 14px 28px rgba(37,99,235,.28);
  }

  /* =========================
     Page
  ========================= */

  .page{
    width:min(var(--max),100%);
    margin:0 auto;
    padding:18px 18px 28px;
  }

  .hero-row{
    display:grid;
    grid-template-columns:1fr auto;
    align-items:end;
    gap:16px;
    margin-bottom:14px;
  }

  .crumbs{
    color:var(--muted);
    font-weight:800;
    font-size:.82rem;
    display:flex;
    align-items:center;
    gap:7px;
    flex-wrap:wrap;
  }

  .crumbs a{
    color:var(--muted);
    cursor:pointer;
  }

  .crumbs a:hover{
    color:var(--accent);
  }

  .crumbs b{
    color:var(--ink);
  }

  .page-title{
    margin-top:5px;
    font-size:clamp(1.48rem,2vw,2.05rem);
    letter-spacing:-.06em;
    line-height:1.02;
    font-weight:950;
  }

  .page-note{
    margin-top:7px;
    color:var(--muted);
    font-weight:650;
    max-width:760px;
    font-size:.9rem;
    line-height:1.45;
  }

  .quick-stats{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  .stat-card{
    min-width:106px;
    border:1px solid var(--line);
    border-radius:16px;
    background:rgba(255,255,255,.74);
    backdrop-filter:blur(16px);
    padding:9px 11px;
    box-shadow:var(--shadow-sm);
  }

  body.dark .stat-card{
    background:rgba(17,24,39,.68);
  }

  .stat-label{
    font-size:.62rem;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--muted);
    font-weight:900;
  }

  .stat-value{
    margin-top:3px;
    font-size:1.02rem;
    letter-spacing:-.04em;
    font-weight:950;
  }

  .toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin:0 0 14px;
    flex-wrap:wrap;
  }

  .left-tools,
  .right-tools{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }

  .chip{
    min-height:34px;
    display:inline-flex;
    align-items:center;
    gap:7px;
    border:1px solid var(--line);
    border-radius:999px;
    background:var(--surface);
    color:var(--ink);
    padding:0 11px;
    font-size:.78rem;
    font-weight:850;
    box-shadow:var(--shadow-sm);
  }

  .chip select{
    border:0;
    outline:0;
    background:transparent;
    color:var(--ink);
    font-weight:850;
    cursor:pointer;
  }

  .simple-btn{
    min-height:34px;
    border:1px solid var(--line);
    border-radius:999px;
    background:var(--surface);
    color:var(--ink);
    padding:0 12px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    font-size:.78rem;
    font-weight:900;
    box-shadow:var(--shadow-sm);
    cursor:pointer;
    transition:.18s ease;
  }

  .simple-btn:hover{
    transform:translateY(-1px);
    box-shadow:var(--shadow-md);
  }

  .simple-btn.primary{
    border:0;
    color:white;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
  }

  .simple-btn.red{
    color:var(--red);
  }

  /* =========================
     Links Grid
  ========================= */

  .links-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
  }

  body.compact .links-grid{
    grid-template-columns:repeat(5,1fr);
    gap:10px;
  }

  body.large .links-grid{
    grid-template-columns:repeat(3,1fr);
    gap:18px;
  }

  .link-card{
    position:relative;
    border:1px solid var(--line);
    border-radius:var(--radius);
    background:rgba(255,255,255,.78);
    backdrop-filter:blur(16px);
    box-shadow:var(--shadow-sm);
    overflow:hidden;
    min-height:150px;
    display:flex;
    flex-direction:column;
    transition:.18s ease;
  }

  body.dark .link-card{
    background:rgba(17,24,39,.70);
  }

  .link-card:hover{
    transform:translateY(-3px);
    box-shadow:var(--shadow-lg);
    border-color:rgba(37,99,235,.32);
  }

  .link-photo{
    height:92px;
    position:relative;
    overflow:hidden;
    background:var(--surface-3);
  }

  body.compact .link-photo{
    height:68px;
  }

  body.large .link-photo{
    height:128px;
  }

  .link-photo img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    opacity:.92;
    transform:scale(1.01);
  }

  body.dark .link-photo img{
    opacity:.70;
  }

  .photo-off .link-photo{
    display:none;
  }

  .pending-ribbon{
    position:absolute;
    top:9px;
    right:9px;
    z-index:4;
    height:23px;
    padding:0 9px;
    border-radius:999px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:rgba(217,119,6,.92);
    color:#fff;
    font-size:.64rem;
    font-weight:950;
    box-shadow:0 8px 18px rgba(0,0,0,.20);
    backdrop-filter:blur(10px);
  }

  .link-body{
    padding:12px;
    display:flex;
    flex-direction:column;
    gap:9px;
    flex:1;
  }

  body.compact .link-body{
    padding:10px;
    gap:7px;
  }

  .link-name{
    font-size:.93rem;
    line-height:1.16;
    font-weight:950;
    letter-spacing:-.035em;
    color:var(--ink);
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }

  .link-meta{
    color:var(--muted);
    font-size:.72rem;
    font-weight:750;
    line-height:1.32;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    word-break:break-word;
  }

  .link-actions{
    margin-top:auto;
    display:grid;
    grid-template-columns:1fr auto;
    gap:8px;
    align-items:center;
  }

  .open-btn,
  .report-btn{
    min-height:34px;
    border-radius:13px;
    font-size:.78rem;
    font-weight:950;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    cursor:pointer;
    transition:.16s ease;
  }

  .open-btn{
    border:0;
    color:white;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 10px 22px rgba(37,99,235,.20);
  }

  .report-btn{
    width:38px;
    border:1px solid var(--line);
    color:var(--muted);
    background:var(--surface);
    box-shadow:var(--shadow-sm);
  }

  .open-btn:hover,
  .report-btn:hover{
    transform:translateY(-1px);
    box-shadow:var(--shadow-md);
  }

  .report-btn:hover{
    color:var(--red);
    border-color:rgba(220,38,38,.24);
  }

  .empty{
    grid-column:1/-1;
    border:1px dashed var(--line-strong);
    border-radius:20px;
    background:rgba(255,255,255,.70);
    padding:30px 18px;
    text-align:center;
    color:var(--muted);
    box-shadow:var(--shadow-sm);
    font-weight:800;
    line-height:1.5;
  }

  body.dark .empty{
    background:rgba(17,24,39,.62);
  }

  .empty strong{
    display:block;
    color:var(--ink);
    font-size:1.05rem;
    margin-bottom:4px;
  }

  /* =========================
     Modal
  ========================= */

  .modal-backdrop{
    position:fixed;
    inset:0;
    background:rgba(2,6,23,.58);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    z-index:100;
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
  }

  .modal-backdrop.show{
    display:flex;
  }

  .modal{
    width:min(620px,100%);
    max-height:min(92vh,780px);
    overflow:auto;
    border:1px solid var(--line);
    border-radius:24px;
    background:var(--surface);
    color:var(--ink);
    box-shadow:0 30px 90px rgba(0,0,0,.34);
  }

  .modal-head{
    position:sticky;
    top:0;
    z-index:2;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
    padding:18px 18px 14px;
    border-bottom:1px solid var(--line);
    background:var(--surface);
  }

  .modal-title{
    font-size:1.18rem;
    font-weight:950;
    letter-spacing:-.05em;
  }

  .modal-sub{
    margin-top:5px;
    color:var(--muted);
    font-weight:700;
    font-size:.86rem;
    line-height:1.4;
  }

  .close-btn{
    width:38px;
    height:38px;
    border-radius:14px;
    border:1px solid var(--line);
    background:var(--surface-2);
    color:var(--ink);
    cursor:pointer;
    font-weight:950;
    font-size:18px;
  }

  .modal-body{
    padding:18px;
  }

  .form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:7px;
  }

  .field.full{
    grid-column:1/-1;
  }

  .field label{
    font-size:.76rem;
    font-weight:900;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.06em;
  }

  .field input,
  .field select,
  .field textarea{
    width:100%;
    min-height:42px;
    border:1px solid var(--line);
    border-radius:14px;
    background:var(--surface-2);
    color:var(--ink);
    outline:none;
    padding:10px 12px;
    font-weight:750;
    box-shadow:none;
  }

  .field textarea{
    min-height:88px;
  }

  .field input:focus,
  .field select:focus,
  .field textarea:focus{
    border-color:rgba(37,99,235,.55);
    box-shadow:0 0 0 4px var(--accent-soft);
  }

  .msg{
    margin-top:14px;
    border-radius:16px;
    padding:13px;
    font-weight:850;
    font-size:.88rem;
    line-height:1.4;
    display:none;
  }

  .msg.ok{
    display:block;
    background:rgba(22,163,74,.10);
    color:var(--green);
    border:1px solid rgba(22,163,74,.24);
  }

  .msg.bad{
    display:block;
    background:rgba(220,38,38,.10);
    color:var(--red);
    border:1px solid rgba(220,38,38,.24);
  }

  .modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    padding:14px 18px 18px;
    border-top:1px solid var(--line);
  }

  .primary-btn,
  .secondary-btn{
    min-height:42px;
    border-radius:14px;
    padding:0 16px;
    font-weight:950;
    cursor:pointer;
    border:1px solid var(--line);
  }

  .secondary-btn{
    background:var(--surface-2);
    color:var(--ink);
  }

  .primary-btn{
    border:0;
    color:white;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 12px 24px rgba(37,99,235,.22);
  }

  .primary-btn:disabled{
    opacity:.55;
    cursor:not-allowed;
  }

  /* =========================
     Responsive
  ========================= */

  @media (max-width:1180px){
    .links-grid{
      grid-template-columns:repeat(3,1fr);
    }

    body.compact .links-grid{
      grid-template-columns:repeat(4,1fr);
    }

    body.large .links-grid{
      grid-template-columns:repeat(3,1fr);
    }
  }

  @media (max-width:980px){
    .header-inner{
      grid-template-columns:1fr auto;
      gap:10px;
      padding:9px 14px;
    }

    .brand{
      min-width:0;
    }

    .search-wrap{
      grid-column:1 / -1;
      grid-row:2;
      max-width:none;
    }

    .header-actions{
      min-width:0;
      gap:7px;
    }

    .status-pill{
      display:none;
    }

    .top-link-btn{
      height:34px;
      padding:0 10px;
      font-size:.76rem;
    }

    .page{
      padding:15px 14px 26px;
    }

    .hero-row{
      grid-template-columns:1fr;
      align-items:start;
    }

    .quick-stats{
      justify-content:flex-start;
    }

    .stat-card{
      min-width:calc(33.333% - 7px);
      flex:1;
    }

    .links-grid,
    body.compact .links-grid,
    body.large .links-grid{
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    .link-photo{
      height:82px;
    }

    .form-grid{
      grid-template-columns:1fr;
    }
  }

  @media (max-width:520px){
    .logo{
      width:38px;
      height:38px;
      border-radius:14px;
    }

    .brand-title{
      font-size:.93rem;
    }

    .brand-sub{
      font-size:.58rem;
    }

    .iconbtn{
      width:34px;
      height:34px;
      border-radius:13px;
    }

    .page-title{
      font-size:1.38rem;
    }

    .page-note{
      font-size:.86rem;
    }

    .stat-card{
      min-width:calc(33.333% - 6px);
      padding:8px 9px;
    }

    .stat-label{
      font-size:.56rem;
    }

    .stat-value{
      font-size:.92rem;
    }

    .toolbar{
      align-items:stretch;
    }

    .left-tools,
    .right-tools{
      width:100%;
    }

    .simple-btn,
    .chip{
      flex:1;
      justify-content:center;
    }

    .modal-backdrop{
      padding:10px;
    }

    .modal{
      border-radius:20px;
    }

    .modal-head{
      padding:15px;
    }

    .modal-body{
      padding:15px;
    }

    .modal-actions{
      padding:12px 15px 15px;
      flex-direction:column;
    }

    .primary-btn,
    .secondary-btn{
      width:100%;
    }
  }
</style>
</head>

<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <button id="btnBack" class="backbtn" title="Back">←</button>

        <div class="logo">RV</div>

        <div class="brand-text">
          <div class="brand-title">RANVEXSI UI</div>
          <div class="brand-sub">by YXU1 AA Ranveer Singh</div>
        </div>
      </div>

      <div class="search-wrap" title="Search links">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M21 21l-4.3-4.3M10.8 18.2a7.4 7.4 0 1 1 0-14.8 7.4 7.4 0 0 1 0 14.8Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <input id="search" placeholder="Search links..." autocomplete="off" />
      </div>

      <div class="header-actions">
        <div class="status-pill" id="dbStatus" title="Supabase status">
          <span class="dot" id="dbDot"></span>
          <span id="dbText">Connecting</span>
        </div>

        <a class="top-link-btn" id="btnRequestTop" href="request.html">+ Request</a>

        <button class="iconbtn" id="btnRefresh" title="Reload">↻</button>
        <button class="iconbtn" id="btnTheme" title="Light/Dark">🌗</button>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="hero-row">
      <div>
        <div class="crumbs" id="crumbs">
          <a href="index.html">Home</a> / <span>Links</span>
        </div>
        <h1 class="page-title" id="pageTitle">Links</h1>
        <p class="page-note" id="pageNote">
          Open your selected workplace tools quickly. Use report if a link is broken or updated.
        </p>
      </div>

      <div class="quick-stats">
        <div class="stat-card">
          <div class="stat-label">Shown</div>
          <div class="stat-value" id="statShown">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">Total</div>
          <div class="stat-value" id="statTotal">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">Pending</div>
          <div class="stat-value" id="statPending">0</div>
        </div>
      </div>
    </section>

    <section class="toolbar">
      <div class="left-tools">
        <button class="simple-btn primary" id="btnOpenFirst" type="button">Open First</button>
        <button class="simple-btn" id="btnCopyPage" type="button">Copy Page Link</button>
        <a class="simple-btn" id="btnBackToDepartment" href="index.html">Sub-Depts</a>
      </div>

      <div class="right-tools">
        <label class="chip">
          Layout
          <select id="density">
            <option value="comfort">Comfort</option>
            <option value="compact">Compact</option>
            <option value="large">Large</option>
          </select>
        </label>

        <label class="chip">
          Images
          <select id="media">
            <option value="on">On</option>
            <option value="off">Off</option>
          </select>
        </label>
      </div>
    </section>

    <section id="linksGrid" class="links-grid" aria-label="Links grid"></section>
  </main>

  <!-- Report Link Modal -->
  <div class="modal-backdrop" id="reportModal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="reportTitle">
      <div class="modal-head">
        <div>
          <div class="modal-title" id="reportTitle">Report Link</div>
          <div class="modal-sub" id="reportSub">
            Tell admin what is wrong with this link.
          </div>
        </div>
        <button class="close-btn" id="closeReportModal" type="button">×</button>
      </div>

      <form id="reportForm">
        <div class="modal-body">
          <div class="form-grid">
            <div class="field full">
              <label>Link</label>
              <input id="reportLinkName" readonly />
            </div>

            <div class="field full">
              <label>Current URL</label>
              <input id="reportCurrentUrl" readonly />
            </div>

            <div class="field full">
              <label>Reason</label>
              <select id="reportReason" required>
                <option value="broken">Link is broken</option>
                <option value="updated">Link is updated</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div class="field full">
              <label>Correct / Updated Link Optional</label>
              <input id="reportSuggestedUrl" placeholder="https://correct-link.com" />
            </div>

            <div class="field full">
              <label>Note Optional</label>
              <textarea id="reportNote" placeholder="Add any helpful details for admin..."></textarea>
            </div>
          </div>

          <div class="msg" id="reportMsg"></div>
        </div>

        <div class="modal-actions">
          <button class="secondary-btn" id="cancelReport" type="button">Cancel</button>
          <button class="primary-btn" id="submitReport" type="submit">Submit Report</button>
        </div>
      </form>
    </div>
  </div>

<script>
/* =========================================================
   Supabase Config
========================================================= */

const SUPABASE_URL = "https://qpplbqodulenhccfzrjv.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_ph2JpBSdGl-dIqvx9F6__g_Oo4r96Y_";

const SUPABASE_TABLE = "ranvexsi_links";
const REQUEST_TABLE = "ranvexsi_requests";
const REPORTS_TABLE = "ranvexsi_link_reports";
const STORAGE_BUCKET = "media";

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

/* =========================================================
   Refs / State
========================================================= */

const els = {
  search: document.getElementById("search"),
  linksGrid: document.getElementById("linksGrid"),
  crumbs: document.getElementById("crumbs"),
  pageTitle: document.getElementById("pageTitle"),
  pageNote: document.getElementById("pageNote"),
  btnBack: document.getElementById("btnBack"),
  btnBackToDepartment: document.getElementById("btnBackToDepartment"),
  btnRequestTop: document.getElementById("btnRequestTop"),
  btnRefresh: document.getElementById("btnRefresh"),
  btnTheme: document.getElementById("btnTheme"),
  btnOpenFirst: document.getElementById("btnOpenFirst"),
  btnCopyPage: document.getElementById("btnCopyPage"),
  density: document.getElementById("density"),
  media: document.getElementById("media"),
  dbDot: document.getElementById("dbDot"),
  dbText: document.getElementById("dbText"),
  statShown: document.getElementById("statShown"),
  statTotal: document.getElementById("statTotal"),
  statPending: document.getElementById("statPending"),

  reportModal: document.getElementById("reportModal"),
  closeReportModal: document.getElementById("closeReportModal"),
  cancelReport: document.getElementById("cancelReport"),
  reportForm: document.getElementById("reportForm"),
  reportLinkName: document.getElementById("reportLinkName"),
  reportCurrentUrl: document.getElementById("reportCurrentUrl"),
  reportReason: document.getElementById("reportReason"),
  reportSuggestedUrl: document.getElementById("reportSuggestedUrl"),
  reportNote: document.getElementById("reportNote"),
  reportMsg: document.getElementById("reportMsg"),
  submitReport: document.getElementById("submitReport"),
  reportSub: document.getElementById("reportSub")
};

let currentDep = "";
let currentSub = "__all__";
let rawRows = [];
let localRequests = [];
let shownRows = [];
let selectedReportLink = null;
let realtimeChannels = [];

const LS = {
  THEME: "rv_theme",
  DENSITY: "rv_density_links",
  MEDIA: "rv_media_links",
  LOCAL_REQUESTS: "rv_local_pending_requests_v1",
  REPORTER_KEY: "rv_reporter_key_v1"
};

/* =========================================================
   Helpers
========================================================= */

function esc(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function safeUrl(url){
  const u = String(url || "").trim();
  if(!u || u === "#") return "#";
  if(u.startsWith("http://") || u.startsWith("https://") || u.startsWith("mailto:") || u.startsWith("tel:")) return u;
  return "https://" + u;
}

function getPublicImage(path){
  const p = String(path || "").trim();
  if(!p || p === "null" || p === "undefined") return "";
  const { data } = db.storage.from(STORAGE_BUCKET).getPublicUrl(p);
  return data?.publicUrl || "";
}

function firstGood(...values){
  for(const v of values){
    const s = String(v || "").trim();
    if(s && s !== "null" && s !== "undefined") return s;
  }
  return "";
}

function imageFromRow(row){
  return firstGood(row.ImageURL, row.image_url, getPublicImage(row.ImagePath || row.image_path));
}

function fallbackImage(text){
  return `https://source.unsplash.com/900x650/?warehouse,tool,workplace,${encodeURIComponent(text || "link")}`;
}

function normalizeRow(row){
  return {
    ID: row.id || "",
    Department: String(row.department ?? row.Department ?? "").trim(),
    SubDepartment: String(row.sub_department ?? row.SubDepartment ?? "").trim(),
    LinkName: String(row.link_name ?? row.LinkName ?? "Unnamed").trim(),
    URL: String(row.url ?? row.URL ?? "#").trim(),
    ImageURL: String(row.image_url ?? row.ImageURL ?? "").trim(),
    ImagePath: String(row.image_path ?? row.ImagePath ?? "").trim(),
    SortOrder: Number(row.sort_order ?? row.SortOrder ?? 0),
    IsActive: row.is_active ?? row.IsActive ?? true,
    Pending:false,
    ClientTempId:""
  };
}

function setDbStatus(type, text){
  els.dbText.textContent = text;
  els.dbDot.classList.remove("ok","bad");

  if(type === "ok") els.dbDot.classList.add("ok");
  if(type === "bad") els.dbDot.classList.add("bad");
}

function getParam(name, fallback=""){
  const params = new URLSearchParams(window.location.search);
  return String(params.get(name) || fallback).trim();
}

function buildUrl(page, params){
  const url = new URL(page, window.location.href);

  Object.entries(params || {}).forEach(([key, value]) => {
    if(value !== null && value !== undefined && String(value).trim() !== ""){
      url.searchParams.set(key, String(value));
    }
  });

  return url.pathname.split("/").pop() + url.search;
}

function makeReporterKey(){
  const existing = localStorage.getItem(LS.REPORTER_KEY);
  if(existing) return existing;

  let key = "";

  if(window.crypto && crypto.randomUUID){
    key = crypto.randomUUID();
  }else{
    key = "rv_reporter_" + Date.now() + "_" + Math.random().toString(36).slice(2);
  }

  localStorage.setItem(LS.REPORTER_KEY, key);
  return key;
}

function getReporterKey(){
  return makeReporterKey();
}

function getLocalRequests(){
  try{
    const rows = JSON.parse(localStorage.getItem(LS.LOCAL_REQUESTS) || "[]");
    return Array.isArray(rows) ? rows : [];
  }catch{
    return [];
  }
}

function localLinkRequests(){
  return localRequests.filter(r => r.request_type === "link" && r.status !== "rejected");
}

function updateStats(){
  const pending = shownRows.filter(r => r.Pending).length;

  els.statShown.textContent = shownRows.length;
  els.statTotal.textContent = rawRows.length;
  els.statPending.textContent = pending;
}

function showMsg(type, message){
  els.reportMsg.className = `msg ${type}`;
  els.reportMsg.innerHTML = message;
}

function clearMsg(){
  els.reportMsg.className = "msg";
  els.reportMsg.innerHTML = "";
}

/* =========================================================
   Theme / Prefs
========================================================= */

function initTheme(){
  let saved = localStorage.getItem(LS.THEME);

  if(!saved){
    saved = "light";
    localStorage.setItem(LS.THEME, saved);
  }

  document.body.classList.toggle("dark", saved === "dark");
}

function toggleTheme(){
  const dark = !document.body.classList.contains("dark");
  document.body.classList.toggle("dark", dark);
  localStorage.setItem(LS.THEME, dark ? "dark" : "light");
}

function initPrefs(){
  const density = localStorage.getItem(LS.DENSITY) || "comfort";
  const media = localStorage.getItem(LS.MEDIA) || "on";

  els.density.value = density;
  els.media.value = media;

  applyDensity(density);
  applyMedia(media);
}

function applyDensity(value){
  document.body.classList.remove("compact","large");

  if(value === "compact"){
    document.body.classList.add("compact");
    document.documentElement.style.setProperty("--radius", "15px");
  }else if(value === "large"){
    document.body.classList.add("large");
    document.documentElement.style.setProperty("--radius", "22px");
  }else{
    document.documentElement.style.setProperty("--radius", "18px");
  }
}

function applyMedia(value){
  document.body.classList.toggle("photo-off", value === "off");
}

/* =========================================================
   Data
========================================================= */

async function loadData(){
  setDbStatus("", "Loading");

  try{
    let query = db
      .from(SUPABASE_TABLE)
      .select("*")
      .eq("is_active", true)
      .order("sort_order", { ascending:true })
      .order("link_name", { ascending:true });

    if(currentDep){
      query = query.eq("department", currentDep);
    }

    if(currentSub && currentSub !== "__all__"){
      query = query.eq("sub_department", currentSub);
    }

    const { data, error } = await query;

    if(error) throw error;

    rawRows = (data || [])
      .map(normalizeRow)
      .filter(row => row.Department && row.LinkName);

    localRequests = getLocalRequests();

    render();
    setDbStatus("ok", `${rawRows.length} links`);
  }catch(err){
    console.error(err);
    setDbStatus("bad", "DB error");

    els.linksGrid.innerHTML = `
      <div class="empty">
        <strong>Failed to load links.</strong>
        ${esc(err.message || err)}<br><br>
        Check Supabase table, columns, or RLS policy.
      </div>
    `;
  }
}

function getPendingRows(){
  return localLinkRequests()
    .filter(req => {
      const depOk = !currentDep || String(req.department || "").toLowerCase() === currentDep.toLowerCase();
      const sub = String(req.sub_department || "General").trim();

      const subOk = currentSub === "__all__" || sub.toLowerCase() === currentSub.toLowerCase();

      return depOk && subOk;
    })
    .map(req => ({
      ID:"",
      Department:req.department || "",
      SubDepartment:req.sub_department || "General",
      LinkName:req.link_name || "Pending Link",
      URL:safeUrl(req.url || "#"),
      ImageURL:req.image_url || "",
      ImagePath:"",
      SortOrder:-1,
      IsActive:true,
      Pending:true,
      ClientTempId:req.client_temp_id || ""
    }));
}

function filterRows(){
  const q = els.search.value.trim().toLowerCase();
  const pendingRows = getPendingRows();

  let rows = [...pendingRows, ...rawRows]
    .sort((a,b) => (a.SortOrder - b.SortOrder) || a.LinkName.localeCompare(b.LinkName));

  if(q){
    rows = rows.filter(row =>
      row.LinkName.toLowerCase().includes(q) ||
      row.URL.toLowerCase().includes(q) ||
      row.Department.toLowerCase().includes(q) ||
      row.SubDepartment.toLowerCase().includes(q)
    );
  }

  shownRows = rows;
  updateStats();

  return rows;
}

/* =========================================================
   Render
========================================================= */

function updatePageInfo(){
  const depText = currentDep || "All Departments";
  const subText = currentSub === "__all__" ? "All Links" : currentSub;

  els.pageTitle.textContent = subText;
  els.pageNote.textContent = currentDep
    ? `${depText}${currentSub !== "__all__" ? " / " + subText : ""} — open links quickly or report broken/updated links.`
    : "Open links quickly or report broken/updated links.";

  els.crumbs.innerHTML = `
    <a href="index.html">Home</a>
    ${currentDep ? `/ <a href="index.html">${esc(currentDep)}</a>` : ""}
    / <b>${esc(subText)}</b>
  `;

  els.btnRequestTop.href = buildUrl("request.html", {
    dep: currentDep,
    sub: currentSub === "__all__" ? "" : currentSub
  });

  els.btnBackToDepartment.href = "index.html";
}

function render(){
  updatePageInfo();

  const rows = filterRows();

  els.linksGrid.innerHTML = "";

  if(rows.length === 0){
    els.linksGrid.innerHTML = `
      <div class="empty">
        <strong>No links found.</strong>
        Try another search or submit a request for this department/sub-department.
      </div>
    `;
    return;
  }

  rows.forEach(row => {
    const image = firstGood(imageFromRow(row), fallbackImage(row.LinkName));
    const url = safeUrl(row.URL);

    const card = document.createElement("article");
    card.className = "link-card";
    card.dataset.linkId = row.ID || "";
    card.dataset.name = row.LinkName;
    card.dataset.url = url;

    card.innerHTML = `
      <div class="link-photo">
        <img src="${esc(image)}" alt="${esc(row.LinkName)}" loading="lazy" decoding="async">
        ${row.Pending ? `<span class="pending-ribbon">Pending</span>` : ``}
      </div>

      <div class="link-body">
        <div>
          <div class="link-name">${esc(row.LinkName)}</div>
          <div class="link-meta">
            ${esc(row.Department)}${row.SubDepartment ? " / " + esc(row.SubDepartment) : ""}<br>
            ${row.Pending ? "Local pending request" : esc(url)}
          </div>
        </div>

        <div class="link-actions">
          <a class="open-btn" href="${esc(url)}" target="_blank" rel="noopener noreferrer">Open</a>
          <button class="report-btn" type="button" title="Report this link">!</button>
        </div>
      </div>
    `;

    const openBtn = card.querySelector(".open-btn");
    const reportBtn = card.querySelector(".report-btn");

    openBtn.addEventListener("click", () => {
      saveRecentlyOpened(row);
    });

    reportBtn.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      openReportModal(row);
    });

    els.linksGrid.appendChild(card);
  });
}

function saveRecentlyOpened(row){
  try{
    const key = "rv_recent_opened_links_v1";
    const old = JSON.parse(localStorage.getItem(key) || "[]");
    const item = {
      name:row.LinkName,
      url:safeUrl(row.URL),
      department:row.Department,
      sub_department:row.SubDepartment,
      opened_at:new Date().toISOString()
    };

    const next = [
      item,
      ...old.filter(x => x.url !== item.url)
    ].slice(0, 50);

    localStorage.setItem(key, JSON.stringify(next));
  }catch{}
}

/* =========================================================
   Report Modal
========================================================= */

function openReportModal(row){
  selectedReportLink = row;
  clearMsg();

  els.reportForm.reset();

  const url = safeUrl(row.URL);

  els.reportTitle.textContent = "Report Link";
  els.reportSub.textContent = `${row.Department}${row.SubDepartment ? " / " + row.SubDepartment : ""}`;
  els.reportLinkName.value = row.LinkName || "";
  els.reportCurrentUrl.value = url || "";

  els.reportModal.classList.add("show");
  setTimeout(() => els.reportReason.focus(), 50);
}

function closeReportModal(){
  els.reportModal.classList.remove("show");
  selectedReportLink = null;
}

async function submitReport(event){
  event.preventDefault();

  if(!selectedReportLink){
    showMsg("bad", "No link selected.");
    return;
  }

  clearMsg();

  const reason = els.reportReason.value;
  const suggestedUrl = els.reportSuggestedUrl.value.trim();
  const note = els.reportNote.value.trim();

  els.submitReport.disabled = true;
  els.submitReport.textContent = "Submitting...";

  try{
    const { error } = await db.rpc("rv_public_report_link", {
      p_link_id: selectedReportLink.ID || null,
      p_department: selectedReportLink.Department || currentDep || "",
      p_sub_department: selectedReportLink.SubDepartment || "",
      p_link_name: selectedReportLink.LinkName || "",
      p_url: safeUrl(selectedReportLink.URL || ""),
      p_reason: reason,
      p_suggested_url: suggestedUrl || "",
      p_note: note || "",
      p_reporter_key: getReporterKey()
    });

    if(error) throw error;

    showMsg("ok", "Report submitted. Admin will review it.");

    setTimeout(() => {
      closeReportModal();
    }, 900);
  }catch(err){
    console.error(err);
    showMsg("bad", esc(err.message || err));
  }finally{
    els.submitReport.disabled = false;
    els.submitReport.textContent = "Submit Report";
  }
}

/* =========================================================
   Actions
========================================================= */

function goBack(){
  window.location.href = "index.html";
}

function openFirst(){
  const first = shownRows[0];

  if(!first){
    alert("No link available to open.");
    return;
  }

  saveRecentlyOpened(first);
  window.open(safeUrl(first.URL), "_blank", "noopener,noreferrer");
}

async function copyPageLink(){
  try{
    await navigator.clipboard.writeText(window.location.href);
    els.btnCopyPage.textContent = "Copied";
    setTimeout(() => {
      els.btnCopyPage.textContent = "Copy Page Link";
    }, 900);
  }catch{
    alert("Could not copy link.");
  }
}

/* =========================================================
   Realtime
========================================================= */

function setupRealtime(){
  realtimeChannels.forEach(ch => {
    try{
      db.removeChannel(ch);
    }catch{}
  });

  realtimeChannels = [];

  const tables = [
    SUPABASE_TABLE,
    REQUEST_TABLE,
    REPORTS_TABLE
  ];

  tables.forEach(table => {
    try{
      const channel = db
        .channel(`rv-links-live-${table}`)
        .on(
          "postgres_changes",
          { event:"*", schema:"public", table },
          async () => {
            await loadData();
          }
        )
        .subscribe();

      realtimeChannels.push(channel);
    }catch(e){
      console.warn("Realtime not started for", table, e);
    }
  });
}

/* =========================================================
   Events
========================================================= */

els.btnBack.addEventListener("click", goBack);
els.btnRefresh.addEventListener("click", loadData);
els.btnTheme.addEventListener("click", toggleTheme);
els.btnOpenFirst.addEventListener("click", openFirst);
els.btnCopyPage.addEventListener("click", copyPageLink);

els.density.addEventListener("change", () => {
  localStorage.setItem(LS.DENSITY, els.density.value);
  applyDensity(els.density.value);
});

els.media.addEventListener("change", () => {
  localStorage.setItem(LS.MEDIA, els.media.value);
  applyMedia(els.media.value);
});

els.closeReportModal.addEventListener("click", closeReportModal);
els.cancelReport.addEventListener("click", closeReportModal);
els.reportForm.addEventListener("submit", submitReport);

els.reportModal.addEventListener("click", (event) => {
  if(event.target === els.reportModal){
    closeReportModal();
  }
});

document.addEventListener("keydown", (event) => {
  if(event.key === "Escape" && els.reportModal.classList.contains("show")){
    closeReportModal();
  }
});

let searchTimer = null;

els.search.addEventListener("input", () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 140);
});

/* =========================================================
   Init
========================================================= */

async function init(){
  currentDep = getParam("dep", "");
  currentSub = getParam("sub", "__all__") || "__all__";

  initTheme();
  initPrefs();

  await loadData();
  setupRealtime();
}

init();
</script>
</body>
</html>
