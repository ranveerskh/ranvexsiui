<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RANVEXSI UI — Links</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --bg:#eef3fb;
    --bg-2:#e7edf8;
    --surface:#ffffff;
    --surface-2:#f7faff;
    --surface-3:#eef5ff;
    --ink:#111827;
    --muted:#6b7280;
    --muted-2:#94a3b8;
    --line:rgba(15,23,42,.10);
    --line-strong:rgba(15,23,42,.16);
    --accent:#2563eb;
    --accent-2:#7c3aed;
    --accent-soft:rgba(37,99,235,.10);
    --green:#16a34a;
    --red:#dc2626;
    --gold:#d97706;
    --shadow-sm:0 6px 16px rgba(15,23,42,.06);
    --shadow-md:0 14px 34px rgba(15,23,42,.10);
    --shadow-lg:0 24px 60px rgba(15,23,42,.14);
    --radius:18px;
    --max:1360px;
    --grid-cols:4;
  }

  body.dark{
    --bg:#080d19;
    --bg-2:#0c1222;
    --surface:#111827;
    --surface-2:#151f33;
    --surface-3:#1b2942;
    --ink:#eef5ff;
    --muted:#a9b7d0;
    --muted-2:#7486a5;
    --line:rgba(255,255,255,.10);
    --line-strong:rgba(255,255,255,.16);
    --accent:#60a5fa;
    --accent-2:#a78bfa;
    --accent-soft:rgba(96,165,250,.12);
    --shadow-sm:0 8px 18px rgba(0,0,0,.22);
    --shadow-md:0 18px 42px rgba(0,0,0,.32);
    --shadow-lg:0 30px 70px rgba(0,0,0,.42);
  }

  *{
    box-sizing:border-box;
    margin:0;
    padding:0;
  }

  html{
    min-height:100%;
    scroll-behavior:smooth;
  }

  body{
    min-height:100vh;
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at top left, rgba(37,99,235,.12), transparent 34%),
      radial-gradient(circle at top right, rgba(124,58,237,.10), transparent 32%),
      linear-gradient(180deg,var(--bg),var(--bg-2));
    overflow-x:hidden;
  }

  button,
  input,
  select,
  textarea{
    font:inherit;
  }

  button{
    -webkit-tap-highlight-color:transparent;
  }

  textarea{
    resize:vertical;
  }

  a{
    color:inherit;
    text-decoration:none;
  }

  .hidden{
    display:none!important;
  }

  /* =========================
     Header
  ========================= */

  .app-header{
    position:sticky;
    top:0;
    z-index:50;
    border-bottom:1px solid var(--line);
    background:rgba(255,255,255,.84);
    backdrop-filter:blur(22px);
    -webkit-backdrop-filter:blur(22px);
    box-shadow:0 8px 30px rgba(15,23,42,.06);
  }

  body.dark .app-header{
    background:rgba(17,24,39,.84);
    box-shadow:0 8px 34px rgba(0,0,0,.22);
  }

  .header-inner{
    width:min(var(--max),100%);
    margin:0 auto;
    min-height:58px;
    padding:8px 18px;
    display:grid;
    grid-template-columns:auto minmax(190px,420px) auto;
    align-items:center;
    gap:12px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:230px;
  }

  .backbtn{
    width:34px;
    height:34px;
    border:1px solid var(--line);
    border-radius:12px;
    background:var(--surface);
    color:var(--ink);
    cursor:pointer;
    box-shadow:var(--shadow-sm);
    display:grid;
    place-items:center;
    font-size:17px;
    transition:.18s ease;
  }

  .backbtn:hover{
    transform:translateY(-1px);
    box-shadow:var(--shadow-md);
    border-color:rgba(37,99,235,.28);
  }

  .logo{
    width:38px;
    height:38px;
    border-radius:14px;
    display:grid;
    place-items:center;
    color:white;
    font-weight:950;
    letter-spacing:-.06em;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 14px 34px rgba(37,99,235,.28);
  }

  .brand-text{
    display:flex;
    flex-direction:column;
    gap:2px;
    line-height:1.05;
  }

  .brand-title{
    font-size:.98rem;
    font-weight:950;
    letter-spacing:-.045em;
  }

  .brand-sub{
    font-size:.60rem;
    color:var(--muted);
    font-weight:750;
    letter-spacing:.01em;
  }

  .search-wrap{
    position:relative;
    width:100%;
    max-width:390px;
    justify-self:center;
  }

  .search-wrap svg{
    position:absolute;
    left:13px;
    top:50%;
    transform:translateY(-50%);
    color:var(--muted);
    pointer-events:none;
  }

  .search-wrap input{
    width:100%;
    height:36px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.88);
    color:var(--ink);
    outline:none;
    border-radius:14px;
    padding:0 14px 0 40px;
    font-size:.84rem;
    font-weight:750;
    box-shadow:var(--shadow-sm);
    transition:.18s ease;
  }

  body.dark .search-wrap input{
    background:rgba(15,23,42,.74);
  }

  .search-wrap input:focus{
    border-color:rgba(37,99,235,.55);
    box-shadow:0 0 0 4px var(--accent-soft), var(--shadow-sm);
  }

  .header-actions{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:7px;
    min-width:0;
  }

  .status-pill{
    height:32px;
    display:flex;
    align-items:center;
    gap:7px;
    border:1px solid var(--line);
    border-radius:999px;
    background:var(--surface);
    padding:0 10px;
    color:var(--muted);
    font-weight:850;
    font-size:.70rem;
    box-shadow:var(--shadow-sm);
    white-space:nowrap;
  }

  .dot{
    width:8px;
    height:8px;
    border-radius:999px;
    background:var(--muted-2);
  }

  .dot.ok{
    background:var(--green);
    box-shadow:0 0 0 4px rgba(22,163,74,.12);
  }

  .dot.bad{
    background:var(--red);
    box-shadow:0 0 0 4px rgba(220,38,38,.12);
  }

  .iconbtn{
    width:32px;
    height:32px;
    border:1px solid var(--line);
    border-radius:12px;
    background:var(--surface);
    color:var(--ink);
    display:grid;
    place-items:center;
    cursor:pointer;
    box-shadow:var(--shadow-sm);
    transition:.18s ease;
    font-size:14px;
  }

  .iconbtn:hover{
    transform:translateY(-1px);
    box-shadow:var(--shadow-md);
    border-color:rgba(37,99,235,.28);
  }

  .top-link-btn{
    height:32px;
    border:0;
    border-radius:12px;
    padding:0 11px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 10px 22px rgba(37,99,235,.22);
    font-size:.75rem;
    font-weight:950;
    white-space:nowrap;
    transition:.18s ease;
  }

  .top-link-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 14px 28px rgba(37,99,235,.28);
  }

  .script-btn{
    height:32px;
    border:0;
    border-radius:12px;
    padding:0 11px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#16a34a,#15803d);
    box-shadow:0 10px 22px rgba(22,163,74,.22);
    font-size:.75rem;
    font-weight:950;
    white-space:nowrap;
    transition:.18s ease;
  }

  .script-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 14px 28px rgba(22,163,74,.28);
  }

  .script-btn svg{
    width:17px;
    height:17px;
    flex:0 0 auto;
  }

  /* =========================
     Page
  ========================= */

  .page{
    width:min(var(--max),100%);
    margin:0 auto;
    padding:16px 18px 28px;
  }

  .titlebar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:14px;
  }

  .title-left{
    min-width:0;
    display:flex;
    align-items:baseline;
    gap:10px;
    flex-wrap:wrap;
  }

  .page-title{
    font-size:clamp(1.42rem,2vw,2rem);
    letter-spacing:-.06em;
    line-height:1.02;
    font-weight:950;
  }

  .title-meta{
    display:inline-flex;
    align-items:center;
    gap:5px;
    min-height:26px;
    border:1px solid var(--line);
    border-radius:999px;
    background:rgba(255,255,255,.68);
    color:var(--muted);
    padding:0 10px;
    font-size:.72rem;
    font-weight:850;
    box-shadow:var(--shadow-sm);
  }

  body.dark .title-meta{
    background:rgba(17,24,39,.60);
  }

  .title-actions{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:8px;
    flex-wrap:wrap;
  }

  .mini-control{
    height:32px;
    display:inline-flex;
    align-items:center;
    gap:7px;
    border:1px solid var(--line);
    border-radius:999px;
    background:var(--surface);
    color:var(--muted);
    padding:0 10px;
    font-size:.73rem;
    font-weight:900;
    box-shadow:var(--shadow-sm);
    white-space:nowrap;
  }

  .mini-control select{
    border:0;
    outline:0;
    background:transparent;
    color:var(--ink);
    font-weight:950;
    cursor:pointer;
  }

  .mini-btn{
    min-height:32px;
    border:1px solid var(--line);
    border-radius:999px;
    background:var(--surface);
    color:var(--ink);
    padding:0 11px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    font-size:.73rem;
    font-weight:950;
    box-shadow:var(--shadow-sm);
    cursor:pointer;
    transition:.18s ease;
    white-space:nowrap;
  }

  .mini-btn:hover{
    transform:translateY(-1px);
    box-shadow:var(--shadow-md);
  }

  .mini-btn.active{
    border-color:rgba(22,163,74,.30);
    color:#fff;
    background:linear-gradient(135deg,#16a34a,#15803d);
  }

  /* =========================
     Links Grid
  ========================= */

  .links-grid{
    display:grid;
    grid-template-columns:repeat(var(--grid-cols),minmax(0,1fr));
    gap:16px;
  }

  .link-card{
    position:relative;
    min-height:188px;
    aspect-ratio:4/3;
    border:1px solid var(--line);
    border-radius:var(--radius);
    background:
      radial-gradient(circle at top left, rgba(37,99,235,.16), transparent 44%),
      linear-gradient(135deg, rgba(37,99,235,.12), rgba(124,58,237,.10)),
      var(--surface);
    overflow:hidden;
    cursor:pointer;
    text-decoration:none;
    box-shadow:var(--shadow-sm);
    transform:translateZ(0);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }

  .link-card:hover{
    transform:translateY(-3px);
    box-shadow:var(--shadow-lg);
    border-color:rgba(37,99,235,.34);
  }

  .link-card:active{
    transform:translateY(-1px) scale(.993);
  }

  .link-img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    opacity:.90;
    transform:scale(1.01);
    transition:transform .28s ease, opacity .18s ease;
  }

  body.dark .link-img{
    opacity:.64;
  }

  body.no-images .link-img{
    display:none!important;
  }

  .link-card:hover .link-img{
    transform:scale(1.04);
  }

  .veil{
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at top left, rgba(37,99,235,.16), transparent 42%),
      linear-gradient(180deg, rgba(0,0,0,.03), rgba(0,0,0,.10));
    pointer-events:none;
  }

  body.dark .veil{
    background:
      radial-gradient(circle at top left, rgba(96,165,250,.18), transparent 42%),
      linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.22));
  }

  .overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,.03) 6%, rgba(0,0,0,.16) 52%, rgba(0,0,0,.80) 100%);
    pointer-events:none;
  }

  body.no-images .overlay{
    background:linear-gradient(180deg, rgba(0,0,0,.03), rgba(0,0,0,.28));
  }

  .pending-ribbon{
    position:absolute;
    top:10px;
    left:10px;
    z-index:4;
    height:24px;
    padding:0 9px;
    border-radius:999px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:rgba(217,119,6,.92);
    color:#fff;
    font-size:.66rem;
    font-weight:950;
    box-shadow:0 8px 18px rgba(0,0,0,.20);
    backdrop-filter:blur(10px);
  }

  .report-btn{
    position:absolute;
    top:10px;
    right:10px;
    z-index:8;
    width:30px;
    height:30px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.30);
    background:rgba(255,255,255,.20);
    color:#fff;
    display:grid;
    place-items:center;
    cursor:pointer;
    backdrop-filter:blur(12px);
    box-shadow:0 8px 18px rgba(0,0,0,.18);
    transition:.16s ease;
    font-weight:950;
    font-size:.9rem;
  }

  .report-btn:hover{
    background:rgba(220,38,38,.86);
    border-color:rgba(255,255,255,.38);
    transform:translateY(-1px);
  }

  .label{
    position:absolute;
    z-index:2;
    left:13px;
    right:13px;
    bottom:12px;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:10px;
    color:white;
  }

  .label-main{
    min-width:0;
  }

  .label-title{
    display:block;
    font-size:.98rem;
    line-height:1.1;
    font-weight:950;
    letter-spacing:-.035em;
    text-shadow:0 2px 10px rgba(0,0,0,.42);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .label-sub{
    margin-top:4px;
    display:block;
    font-size:.70rem;
    color:rgba(255,255,255,.80);
    font-weight:800;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    text-shadow:0 2px 8px rgba(0,0,0,.38);
  }

  .pill{
    flex:0 0 auto;
    display:inline-flex;
    align-items:center;
    gap:6px;
    height:25px;
    padding:0 9px;
    border-radius:999px;
    background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.22);
    color:white;
    font-size:.69rem;
    font-weight:950;
    backdrop-filter:blur(10px);
    box-shadow:0 6px 18px rgba(0,0,0,.15);
  }

  .empty{
    grid-column:1/-1;
    border:1px dashed var(--line-strong);
    border-radius:20px;
    background:rgba(255,255,255,.70);
    padding:30px 18px;
    text-align:center;
    color:var(--muted);
    box-shadow:var(--shadow-sm);
    font-weight:800;
    line-height:1.5;
  }

  body.dark .empty{
    background:rgba(17,24,39,.62);
  }

  .empty strong{
    display:block;
    color:var(--ink);
    font-size:1.05rem;
    margin-bottom:4px;
  }

  /* =========================
     Modal
  ========================= */

  .modal-backdrop{
    position:fixed;
    inset:0;
    background:rgba(2,6,23,.58);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    z-index:100;
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
  }

  .modal-backdrop.show{
    display:flex;
  }

  .modal{
    width:min(620px,100%);
    max-height:min(92vh,780px);
    overflow:auto;
    border:1px solid var(--line);
    border-radius:24px;
    background:var(--surface);
    color:var(--ink);
    box-shadow:0 30px 90px rgba(0,0,0,.34);
  }

  .modal-head{
    position:sticky;
    top:0;
    z-index:2;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
    padding:18px 18px 14px;
    border-bottom:1px solid var(--line);
    background:var(--surface);
  }

  .modal-title{
    font-size:1.18rem;
    font-weight:950;
    letter-spacing:-.05em;
  }

  .modal-sub{
    margin-top:5px;
    color:var(--muted);
    font-weight:700;
    font-size:.86rem;
    line-height:1.4;
  }

  .close-btn{
    width:38px;
    height:38px;
    border-radius:14px;
    border:1px solid var(--line);
    background:var(--surface-2);
    color:var(--ink);
    cursor:pointer;
    font-weight:950;
    font-size:18px;
  }

  .modal-body{
    padding:18px;
  }

  .form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:7px;
  }

  .field.full{
    grid-column:1/-1;
  }

  .field label{
    font-size:.76rem;
    font-weight:900;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.06em;
  }

  .field input,
  .field select,
  .field textarea{
    width:100%;
    min-height:42px;
    border:1px solid var(--line);
    border-radius:14px;
    background:var(--surface-2);
    color:var(--ink);
    outline:none;
    padding:10px 12px;
    font-weight:750;
    box-shadow:none;
  }

  .field textarea{
    min-height:88px;
  }

  .field input:focus,
  .field select:focus,
  .field textarea:focus{
    border-color:rgba(37,99,235,.55);
    box-shadow:0 0 0 4px var(--accent-soft);
  }

  .msg{
    margin-top:14px;
    border-radius:16px;
    padding:13px;
    font-weight:850;
    font-size:.88rem;
    line-height:1.4;
    display:none;
  }

  .msg.ok{
    display:block;
    background:rgba(22,163,74,.10);
    color:var(--green);
    border:1px solid rgba(22,163,74,.24);
  }

  .msg.bad{
    display:block;
    background:rgba(220,38,38,.10);
    color:var(--red);
    border:1px solid rgba(220,38,38,.24);
  }

  .modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    padding:14px 18px 18px;
    border-top:1px solid var(--line);
  }

  .primary-btn,
  .secondary-btn{
    min-height:42px;
    border-radius:14px;
    padding:0 16px;
    font-weight:950;
    cursor:pointer;
    border:1px solid var(--line);
  }

  .secondary-btn{
    background:var(--surface-2);
    color:var(--ink);
  }

  .primary-btn{
    border:0;
    color:white;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 12px 24px rgba(37,99,235,.22);
  }

  .primary-btn:disabled{
    opacity:.55;
    cursor:not-allowed;
  }

  /* =========================
     Responsive
  ========================= */

  @media (max-width:1180px){
    .links-grid{
      grid-template-columns:repeat(3,minmax(0,1fr));
    }
  }

  @media (max-width:980px){
    .header-inner{
      grid-template-columns:1fr auto;
      gap:9px;
      padding:8px 14px;
    }

    .brand{
      min-width:0;
    }

    .search-wrap{
      grid-column:1 / -1;
      grid-row:2;
      max-width:none;
    }

    .header-actions{
      min-width:0;
      gap:6px;
    }

    .status-pill{
      display:none;
    }

    .top-link-btn,
    .script-btn{
      height:32px;
      padding:0 10px;
      font-size:.73rem;
    }

    .script-btn span{
      display:none;
    }

    .script-btn{
      width:34px;
      padding:0;
      border-radius:12px;
    }

    .page{
      padding:14px 14px 26px;
    }

    .titlebar{
      align-items:flex-start;
      flex-direction:column;
      gap:10px;
    }

    .title-actions{
      width:100%;
      justify-content:flex-start;
    }

    .links-grid{
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .link-card{
      min-height:152px;
      border-radius:17px;
      aspect-ratio:1.05;
    }

    .label{
      left:11px;
      right:11px;
      bottom:10px;
      align-items:flex-start;
      flex-direction:column;
      gap:7px;
    }

    .label-title{
      font-size:.86rem;
      white-space:normal;

<script>
/* =========================================================
   Supabase Config
========================================================= */

const SUPABASE_URL = "https://qpplbqodulenhccfzrjv.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_ph2JpBSdGl-dIqvx9F6__g_Oo4r96Y_";

const SUPABASE_TABLE = "ranvexsi_links";
const REQUEST_TABLE = "ranvexsi_requests";
const REPORTS_TABLE = "ranvexsi_link_reports";
const SETTINGS_TABLE = "ranvexsi_settings";
const STORAGE_BUCKET = "media";

/*
  Optional fallback script URL.
  If you do not have ranvexsi_settings table yet, you can paste your Tampermonkey link here.
  Example:
  const SCRIPT_DOWNLOAD_URL = "https://your-link.com/ranvexsi.user.js";
*/
const SCRIPT_DOWNLOAD_URL = "";

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

/* =========================================================
   Refs / State
========================================================= */

const els = {
  search: document.getElementById("search"),
  linksGrid: document.getElementById("linksGrid"),
  pageTitle: document.getElementById("pageTitle"),
  titleMeta: document.getElementById("titleMeta"),
  btnBack: document.getElementById("btnBack"),
  btnRequestTop: document.getElementById("btnRequestTop"),
  btnScriptTop: document.getElementById("btnScriptTop"),
  btnRefresh: document.getElementById("btnRefresh"),
  btnTheme: document.getElementById("btnTheme"),
  btnCopyPage: document.getElementById("btnCopyPage"),
  btnMedia: document.getElementById("btnMedia"),
  gridCount: document.getElementById("gridCount"),
  dbDot: document.getElementById("dbDot"),
  dbText: document.getElementById("dbText"),

  reportModal: document.getElementById("reportModal"),
  closeReportModal: document.getElementById("closeReportModal"),
  cancelReport: document.getElementById("cancelReport"),
  reportForm: document.getElementById("reportForm"),
  reportLinkName: document.getElementById("reportLinkName"),
  reportCurrentUrl: document.getElementById("reportCurrentUrl"),
  reportReason: document.getElementById("reportReason"),
  reportSuggestedUrl: document.getElementById("reportSuggestedUrl"),
  reportNote: document.getElementById("reportNote"),
  reportMsg: document.getElementById("reportMsg"),
  submitReport: document.getElementById("submitReport"),
  reportSub: document.getElementById("reportSub")
};

let currentDep = "";
let currentSub = "__all__";
let rawRows = [];
let localRequests = [];
let shownRows = [];
let selectedReportLink = null;
let realtimeChannels = [];

const LS = {
  THEME: "rv_theme",
  GRID: "rv_grid_links",
  MEDIA: "rv_media_links",
  LOCAL_REQUESTS: "rv_local_pending_requests_v1",
  REPORTER_KEY: "rv_reporter_key_v1"
};

/* =========================================================
   Helpers
========================================================= */

function esc(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function safeUrl(url){
  const u = String(url || "").trim();

  if(!u || u === "#"){
    return "#";
  }

  if(
    u.startsWith("http://") ||
    u.startsWith("https://") ||
    u.startsWith("mailto:") ||
    u.startsWith("tel:")
  ){
    return u;
  }

  return "https://" + u;
}

function getPublicImage(path){
  const p = String(path || "").trim();

  if(!p || p === "null" || p === "undefined"){
    return "";
  }

  const { data } = db.storage.from(STORAGE_BUCKET).getPublicUrl(p);
  return data?.publicUrl || "";
}

function firstGood(...values){
  for(const v of values){
    const s = String(v || "").trim();

    if(s && s !== "null" && s !== "undefined"){
      return s;
    }
  }

  return "";
}

function imageFromRow(row){
  return firstGood(
    row.ImageURL,
    row.image_url,
    getPublicImage(row.ImagePath || row.image_path)
  );
}

function fallbackImage(text){
  return `https://source.unsplash.com/900x650/?warehouse,tool,workplace,${encodeURIComponent(text || "link")}`;
}

function normalizeRow(row){
  return {
    ID: row.id || "",
    Department: String(row.department ?? row.Department ?? "").trim(),
    SubDepartment: String(row.sub_department ?? row.SubDepartment ?? "").trim(),
    LinkName: String(row.link_name ?? row.LinkName ?? "Unnamed").trim(),
    URL: String(row.url ?? row.URL ?? "#").trim(),
    ImageURL: String(row.image_url ?? row.ImageURL ?? "").trim(),
    ImagePath: String(row.image_path ?? row.ImagePath ?? "").trim(),
    SortOrder: Number(row.sort_order ?? row.SortOrder ?? 0),
    IsActive: row.is_active ?? row.IsActive ?? true,
    Pending:false,
    ClientTempId:""
  };
}

function setDbStatus(type, text){
  els.dbText.textContent = text;
  els.dbDot.classList.remove("ok","bad");

  if(type === "ok"){
    els.dbDot.classList.add("ok");
  }

  if(type === "bad"){
    els.dbDot.classList.add("bad");
  }
}

function getParam(name, fallback=""){
  const params = new URLSearchParams(window.location.search);
  return String(params.get(name) || fallback).trim();
}

function buildUrl(page, params){
  const url = new URL(page, window.location.href);

  Object.entries(params || {}).forEach(([key, value]) => {
    if(value !== null && value !== undefined && String(value).trim() !== ""){
      url.searchParams.set(key, String(value));
    }
  });

  return url.pathname.split("/").pop() + url.search;
}

function makeReporterKey(){
  const existing = localStorage.getItem(LS.REPORTER_KEY);

  if(existing){
    return existing;
  }

  let key = "";

  if(window.crypto && crypto.randomUUID){
    key = crypto.randomUUID();
  }else{
    key = "rv_reporter_" + Date.now() + "_" + Math.random().toString(36).slice(2);
  }

  localStorage.setItem(LS.REPORTER_KEY, key);
  return key;
}

function getReporterKey(){
  return makeReporterKey();
}

function getLocalRequests(){
  try{
    const rows = JSON.parse(localStorage.getItem(LS.LOCAL_REQUESTS) || "[]");
    return Array.isArray(rows) ? rows : [];
  }catch{
    return [];
  }
}

function localLinkRequests(){
  return localRequests.filter(r => r.request_type === "link" && r.status !== "rejected");
}

function showMsg(type, message){
  els.reportMsg.className = `msg ${type}`;
  els.reportMsg.innerHTML = message;
}

function clearMsg(){
  els.reportMsg.className = "msg";
  els.reportMsg.innerHTML = "";
}

function updateTitleMeta(){
  const pending = shownRows.filter(r => r.Pending).length;
  const countText = `${shownRows.length} shown`;

  if(pending > 0){
    els.titleMeta.textContent = `${countText} · ${pending} pending`;
  }else{
    els.titleMeta.textContent = countText;
  }
}

function getSubText(){
  return currentSub === "__all__" ? "All Links" : currentSub;
}

/* =========================================================
   Theme / Prefs
========================================================= */

function initTheme(){
  let saved = localStorage.getItem(LS.THEME);

  if(!saved){
    saved = "dark";
    localStorage.setItem(LS.THEME, saved);
  }

  document.body.classList.toggle("dark", saved === "dark");
}

function toggleTheme(){
  const dark = !document.body.classList.contains("dark");
  document.body.classList.toggle("dark", dark);
  localStorage.setItem(LS.THEME, dark ? "dark" : "light");
}

function initPrefs(){
  const grid = localStorage.getItem(LS.GRID) || "4";
  const media = localStorage.getItem(LS.MEDIA) || "on";

  els.gridCount.value = ["3","4","5"].includes(grid) ? grid : "4";

  applyGrid(els.gridCount.value);
  applyMedia(media);
}

function applyGrid(value){
  const count = ["3","4","5"].includes(String(value)) ? String(value) : "4";

  document.documentElement.style.setProperty("--grid-cols", count);
  localStorage.setItem(LS.GRID, count);
  els.gridCount.value = count;
}

function applyMedia(value){
  const on = value !== "off";

  document.body.classList.toggle("no-images", !on);
  els.btnMedia.textContent = on ? "Images On" : "Images Off";
  els.btnMedia.classList.toggle("active", on);

  localStorage.setItem(LS.MEDIA, on ? "on" : "off");
}

function toggleMedia(){
  const current = localStorage.getItem(LS.MEDIA) || "on";
  applyMedia(current === "on" ? "off" : "on");
}

/* =========================================================
   Script Link
========================================================= */

function getRowKey(row){
  return String(
    row.setting_key ??
    row.key ??
    row.name ??
    row.setting ??
    row.slug ??
    row.title ??
    ""
  ).trim().toLowerCase();
}

function getRowValue(row){
  return firstGood(
    row.setting_value,
    row.value,
    row.url,
    row.script_url,
    row.download_url,
    row.link,
    row.href
  );
}

function isScriptSettingKey(key){
  if(!key){
    return false;
  }

  return (
    key === "tampermonkey_script_url" ||
    key === "tampermonkey_url" ||
    key === "script_url" ||
    key === "userscript_url" ||
    key.includes("tampermonkey") ||
    key.includes("script")
  );
}

function showScriptButton(url){
  const clean = String(url || "").trim();

  if(!clean || clean === "#"){
    els.btnScriptTop.classList.add("hidden");
    els.btnScriptTop.href = "#";
    return;
  }

  els.btnScriptTop.href = safeUrl(clean);
  els.btnScriptTop.classList.remove("hidden");
}

async function loadScriptLink(){
  let scriptUrl = String(SCRIPT_DOWNLOAD_URL || "").trim();

  if(scriptUrl){
    showScriptButton(scriptUrl);
    return;
  }

  try{
    const { data, error } = await db
      .from(SETTINGS_TABLE)
      .select("*")
      .limit(100);

    if(error){
      throw error;
    }

    const rows = Array.isArray(data) ? data : [];

    const found = rows.find(row => {
      const key = getRowKey(row);
      const value = getRowValue(row);
      return isScriptSettingKey(key) && value;
    });

    if(found){
      scriptUrl = getRowValue(found);
    }

    showScriptButton(scriptUrl);
  }catch(err){
    console.warn("Script settings table not ready. Script button hidden:", err.message || err);
    showScriptButton("");
  }
}

/* =========================================================
   Data
========================================================= */

async function loadData(){
  setDbStatus("", "Loading");

  try{
    let query = db
      .from(SUPABASE_TABLE)
      .select("*")
      .eq("is_active", true)
      .order("sort_order", { ascending:true })
      .order("link_name", { ascending:true });

    if(currentDep){
      query = query.eq("department", currentDep);
    }

    if(currentSub && currentSub !== "__all__"){
      query = query.eq("sub_department", currentSub);
    }

    const { data, error } = await query;

    if(error){
      throw error;
    }

    rawRows = (data || [])
      .map(normalizeRow)
      .filter(row => row.Department && row.LinkName);

    localRequests = getLocalRequests();

    render();
    setDbStatus("ok", `${rawRows.length} links`);
  }catch(err){
    console.error(err);
    setDbStatus("bad", "DB error");

    els.linksGrid.innerHTML = `
      <div class="empty">
        <strong>Failed to load links.</strong>
        ${esc(err.message || err)}<br><br>
        Check Supabase table, columns, or RLS policy.
      </div>
    `;
  }
}

function getPendingRows(){
  return localLinkRequests()
    .filter(req => {
      const depOk = !currentDep || String(req.department || "").toLowerCase() === currentDep.toLowerCase();
      const sub = String(req.sub_department || "General").trim();
      const subOk = currentSub === "__all__" || sub.toLowerCase() === currentSub.toLowerCase();

      return depOk && subOk;
    })
    .map(req => ({
      ID:"",
      Department:req.department || "",
      SubDepartment:req.sub_department || "General",
      LinkName:req.link_name || "Pending Link",
      URL:safeUrl(req.url || "#"),
      ImageURL:req.image_url || "",
      ImagePath:"",
      SortOrder:-1,
      IsActive:true,
      Pending:true,
      ClientTempId:req.client_temp_id || ""
    }));
}

function filterRows(){
  const q = els.search.value.trim().toLowerCase();
  const pendingRows = getPendingRows();

  let rows = [...pendingRows, ...rawRows]
    .sort((a,b) => (a.SortOrder - b.SortOrder) || a.LinkName.localeCompare(b.LinkName));

  if(q){
    rows = rows.filter(row =>
      row.LinkName.toLowerCase().includes(q) ||
      row.URL.toLowerCase().includes(q) ||
      row.Department.toLowerCase().includes(q) ||
      row.SubDepartment.toLowerCase().includes(q)
    );
  }

  shownRows = rows;
  updateTitleMeta();

  return rows;
}

/* =========================================================
   Render
========================================================= */

function updatePageInfo(){
  const depText = currentDep || "All Departments";
  const subText = getSubText();

  els.pageTitle.textContent = subText;

  els.btnRequestTop.href = buildUrl("request.html", {
    dep: currentDep,
    sub: currentSub === "__all__" ? "" : currentSub
  });

  if(currentDep){
    els.titleMeta.textContent = `${depText} · 0 shown`;
  }else{
    els.titleMeta.textContent = "0 shown";
  }
}

function render(){
  updatePageInfo();

  const rows = filterRows();

  els.linksGrid.innerHTML = "";

  if(rows.length === 0){
    els.linksGrid.innerHTML = `
      <div class="empty">
        <strong>No links found.</strong>
        Try another search or submit a request for this department/sub-department.
      </div>
    `;
    return;
  }

  rows.forEach(row => {
    const image = firstGood(imageFromRow(row), fallbackImage(row.LinkName));
    const url = safeUrl(row.URL);
    const card = document.createElement("article");

    card.className = "link-card";
    card.dataset.linkId = row.ID || "";
    card.dataset.name = row.LinkName;
    card.dataset.url = url;
    card.tabIndex = 0;
    card.setAttribute("role", "link");
    card.setAttribute("aria-label", `Open ${row.LinkName}`);

    card.innerHTML = `
      <img class="link-img" src="${esc(image)}" alt="${esc(row.LinkName)}" loading="lazy" decoding="async">
      <div class="veil"></div>
      <div class="overlay"></div>

      ${row.Pending ? `<span class="pending-ribbon">Pending</span>` : ``}

      <button class="report-btn" type="button" title="Report this link" aria-label="Report ${esc(row.LinkName)}">!</button>

      <div class="label">
        <div class="label-main">
          <span class="label-title">${esc(row.LinkName)}</span>
          <span class="label-sub">${esc(row.Department)}${row.SubDepartment ? " / " + esc(row.SubDepartment) : ""}</span>
        </div>
        <span class="pill">${row.Pending ? "Pending" : "Open"}</span>
      </div>
    `;

    card.addEventListener("click", () => {
      openLink(row);
    });

    card.addEventListener("keydown", (event) => {
      if(event.key === "Enter" || event.key === " "){
        event.preventDefault();
        openLink(row);
      }
    });

    const reportBtn = card.querySelector(".report-btn");

    reportBtn.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      openReportModal(row);
    });

    els.linksGrid.appendChild(card);
  });
}

function openLink(row){
  const url = safeUrl(row.URL);

  if(!url || url === "#"){
    alert("No valid link found.");
    return;
  }

  saveRecentlyOpened(row);
  window.open(url, "_blank", "noopener,noreferrer");
}

function saveRecentlyOpened(row){
  try{
    const key = "rv_recent_opened_links_v1";
    const old = JSON.parse(localStorage.getItem(key) || "[]");

    const item = {
      name:row.LinkName,
      url:safeUrl(row.URL),
      department:row.Department,
      sub_department:row.SubDepartment,
      opened_at:new Date().toISOString()
    };

    const next = [
      item,
      ...old.filter(x => x.url !== item.url)
    ].slice(0, 50);

    localStorage.setItem(key, JSON.stringify(next));
  }catch{}
}

/* =========================================================
   Report Modal
========================================================= */

function openReportModal(row){
  selectedReportLink = row;
  clearMsg();

  els.reportForm.reset();

  const url = safeUrl(row.URL);

  els.reportTitle.textContent = "Report Link";
  els.reportSub.textContent = `${row.Department}${row.SubDepartment ? " / " + row.SubDepartment : ""}`;
  els.reportLinkName.value = row.LinkName || "";
  els.reportCurrentUrl.value = url || "";

  els.reportModal.classList.add("show");
  setTimeout(() => els.reportReason.focus(), 50);
}

function closeReportModal(){
  els.reportModal.classList.remove("show");
  selectedReportLink = null;
}

async function submitReport(event){
  event.preventDefault();

  if(!selectedReportLink){
    showMsg("bad", "No link selected.");
    return;
  }

  clearMsg();

  const reason = els.reportReason.value;
  const suggestedUrl = els.reportSuggestedUrl.value.trim();
  const note = els.reportNote.value.trim();

  els.submitReport.disabled = true;
  els.submitReport.textContent = "Submitting...";

  try{
    const { error } = await db.rpc("rv_public_report_link", {
      p_link_id: selectedReportLink.ID || null,
      p_department: selectedReportLink.Department || currentDep || "",
      p_sub_department: selectedReportLink.SubDepartment || "",
      p_link_name: selectedReportLink.LinkName || "",
      p_url: safeUrl(selectedReportLink.URL || ""),
      p_reason: reason,
      p_suggested_url: suggestedUrl || "",
      p_note: note || "",
      p_reporter_key: getReporterKey()
    });

    if(error){
      throw error;
    }

    showMsg("ok", "Report submitted. Admin will review it.");

    setTimeout(() => {
      closeReportModal();
    }, 900);
  }catch(err){
    console.error(err);
    showMsg("bad", esc(err.message || err));
  }finally{
    els.submitReport.disabled = false;
    els.submitReport.textContent = "Submit Report";
  }
}

/* =========================================================
   Actions
========================================================= */

function goBack(){
  window.location.href = "index.html";
}

async function copyPageLink(){
  try{
    await navigator.clipboard.writeText(window.location.href);

    els.btnCopyPage.textContent = "Copied";

    setTimeout(() => {
      els.btnCopyPage.textContent = "Copy Page";
    }, 900);
  }catch{
    alert("Could not copy link.");
  }
}

/* =========================================================
   Realtime
========================================================= */

function setupRealtime(){
  realtimeChannels.forEach(ch => {
    try{
      db.removeChannel(ch);
    }catch{}
  });

  realtimeChannels = [];

  const tables = [
    SUPABASE_TABLE,
    REQUEST_TABLE,
    REPORTS_TABLE,
    SETTINGS_TABLE
  ];

  tables.forEach(table => {
    try{
      const channel = db
        .channel(`rv-links-live-${table}`)
        .on(
          "postgres_changes",
          { event:"*", schema:"public", table },
          async () => {
            if(table === SETTINGS_TABLE){
              await loadScriptLink();
            }else{
              await loadData();
            }
          }
        )
        .subscribe();

      realtimeChannels.push(channel);
    }catch(e){
      console.warn("Realtime not started for", table, e);
    }
  });
}

/* =========================================================
   Events
========================================================= */

els.btnBack.addEventListener("click", goBack);
els.btnRefresh.addEventListener("click", async () => {
  await loadData();
  await loadScriptLink();
});
els.btnTheme.addEventListener("click", toggleTheme);
els.btnCopyPage.addEventListener("click", copyPageLink);

els.gridCount.addEventListener("change", () => {
  applyGrid(els.gridCount.value);
});

els.btnMedia.addEventListener("click", toggleMedia);

els.closeReportModal.addEventListener("click", closeReportModal);
els.cancelReport.addEventListener("click", closeReportModal);
els.reportForm.addEventListener("submit", submitReport);

els.reportModal.addEventListener("click", (event) => {
  if(event.target === els.reportModal){
    closeReportModal();
  }
});

document.addEventListener("keydown", (event) => {
  if(event.key === "Escape" && els.reportModal.classList.contains("show")){
    closeReportModal();
  }
});

let searchTimer = null;

els.search.addEventListener("input", () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 140);
});

/* =========================================================
   Init
========================================================= */

async function init(){
  currentDep = getParam("dep", "");
  currentSub = getParam("sub", "__all__") || "__all__";

  initTheme();
  initPrefs();

  await loadData();
  await loadScriptLink();
  setupRealtime();
}

init();
</script>
</body>
</html>
